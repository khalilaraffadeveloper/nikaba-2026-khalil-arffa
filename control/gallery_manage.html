<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>إدارة المعرض - لوحة التحكم</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link rel="stylesheet" href="../css/style.css" />
    <link rel="stylesheet" href="../css/control.css" />
    <script src="../js/supabase.js"></script>
</head>
<body class="control-page">
    <div class="control-wrapper">
        <div class="menu">
            <div class="profile">
                <div class="img-box"><img src="../images/logoNikabo.png" alt="الشعار" /></div>
                <h2>الإدارة</h2>
            </div>
            <ul>
                <li><a href="dashboard.html"><i class="fas fa-chart-pie"></i><span>الرئيسية</span></a></li>
                <li><a href="members.html"><i class="fas fa-users"></i><span>الأعضاء</span></a></li>
                <li><a href="news_manage.html"><i class="fas fa-newspaper"></i><span>الأخبار</span></a></li>
                <li><a href="events_manage.html"><i class="fas fa-calendar-alt"></i><span>الفعاليات</span></a></li>
                <li><a href="gallery_manage.html" class="active"><i class="fas fa-images"></i><span>المعرض</span></a></li>
                <li><a href="messages_manage.html"><i class="fas fa-envelope"></i><span>الرسائل</span></a></li>
                <li><a href="settings.html"><i class="fas fa-cog"></i><span>الإعدادات</span></a></li>
                <li class="logout"><a href="javascript:void(0)" onclick="SB.logout();window.location.href='ctrl_login.html'"><i class="fas fa-sign-out-alt"></i><span>تسجيل خروج</span></a></li>
            </ul>
        </div>

        <main class="content">
            <div class="control-header">
                <h1><i class="fas fa-images"></i> إدارة المعرض</h1>
                <div class="header-left"><span>مرحباً، <strong id="adminName">المشرف</strong></span></div>
            </div>

            <div style="display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;">
                <button class="btn-secondary" style="margin:0;padding:8px 18px;font-size:12px;background:var(--accent);color:#0a0a14;border-color:var(--accent);">الكل (<span id="countAll">0</span>)</button>
                <button class="btn-secondary" style="margin:0;padding:8px 18px;font-size:12px;" data-f="فعاليات">فعاليات (<span id="countEvents">0</span>)</button>
                <button class="btn-secondary" style="margin:0;padding:8px 18px;font-size:12px;" data-f="أخبار">أخبار (<span id="countNews">0</span>)</button>
            </div>
            <div class="toolbar">
                <div class="search-box"><i class="fas fa-search"></i><input type="text" placeholder="بحث..." /></div>
            </div>

            <div class="gallery-manage-grid" id="galleryGrid"></div>

            <div class="section-card" style="margin-top:20px;">
                <h2><i class="fas fa-cloud-upload-alt"></i> رفع صور جديدة</h2>
                <form id="uploadForm">
                    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
                        <div class="form-group"><label>رابط الصورة (URL)</label><input type="url" id="imageUrl" placeholder="https://example.com/image.jpg" /></div>
                        <div class="form-group"><label>التصنيف</label><select id="imageCategory"><option>فعاليات</option><option>أخبار</option><option>أعضاء</option><option>أخرى</option></select></div>
                    </div>
                    <div class="form-group"><label>الوصف</label><input type="text" id="imageCaption" placeholder="وصف الصورة..." /></div>
                    <button type="submit" class="btn-primary"><i class="fas fa-upload"></i> إضافة</button>
                </form>
            </div>
        </main>
    </div>

    <script>
        SB.requireAuth('ctrl_login.html', true);

        var allImages = [];

        async function loadGallery() {
            try {
                var data = await SB.api('gallery', 'select=*&order=created_at.desc');
                allImages = data || [];
                updateCounts();
                renderGallery('');
            } catch(e) { console.warn(e); }
        }

        function updateCounts() {
            var counts = { all: allImages.length, فعاليات: 0, أخبار: 0 };
            allImages.forEach(function(img) {
                var c = img.album || '';
                if (counts[c] !== undefined) counts[c]++;
            });
            document.getElementById('countAll').textContent = counts.all;
            document.getElementById('countEvents').textContent = counts['فعاليات'] || 0;
            document.getElementById('countNews').textContent = counts['أخبار'] || 0;
        }

        function renderGallery(filter) {
            var grid = document.getElementById('galleryGrid');
            var filtered = filter ? allImages.filter(function(i) { return (i.album || '') === filter; }) : allImages;
            grid.innerHTML = filtered.map(function(img) {
                return '<div style="position:relative;border-radius:8px;overflow:hidden;aspect-ratio:1;border:1px solid var(--border);">' +
                    '<img src="' + (img.image_path || '') + '" style="width:100%;height:100%;object-fit:cover;" onerror="this.style.display=\'none\'" />' +
                    '<div style="position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,.7);padding:6px 8px;font-size:11px;">' + (img.title || '') + '</div>' +
                    '<button onclick="deleteImage(\'' + img.id + '\')" style="position:absolute;top:4px;left:4px;background:#e74c3c;color:#fff;border:none;border-radius:4px;padding:4px 8px;font-size:10px;cursor:pointer;"><i class="fas fa-trash"></i></button>' +
                '</div>';
            }).join('') || '<div style="text-align:center;padding:40px;color:var(--text-muted);">لا توجد صور</div>';
        }

        document.querySelectorAll('[data-f]').forEach(function(btn) {
            btn.addEventListener('click', function() {
                document.querySelectorAll('[data-f]').forEach(function(b) { b.style.background = ''; b.style.color = ''; });
                this.style.background = 'var(--accent)'; this.style.color = '#0a0a14';
                renderGallery(this.getAttribute('data-f'));
            });
        });

        document.getElementById('uploadForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            var url = document.getElementById('imageUrl').value.trim();
            if (!url) { alert('الرجاء إدخال رابط الصورة'); return; }
            try {
                await SB.api('gallery', null, {
                    image_path: url,
                    album: document.getElementById('imageCategory').value,
                    title: document.getElementById('imageCaption').value
                });
                alert('تمت الإضافة');
                document.getElementById('imageUrl').value = '';
                document.getElementById('imageCaption').value = '';
                loadGallery();
            } catch(e) { alert('خطأ: ' + e.message); }
        });

        async function deleteImage(id) {
            if (!confirm('حذف هذه الصورة؟')) return;
            try {
                await SB.api('gallery', 'id=eq.' + id, null, 'DELETE');
                loadGallery();
            } catch(e) { alert('خطأ: ' + e.message); }
        }

        document.getElementById('adminName').textContent = (JSON.parse(localStorage.getItem('member') || sessionStorage.getItem('member') || '{}')).full_name || 'المشرف';
        loadGallery();
    </script>
</body>
</html>
