    <script>
    (function() {
        var role = await SupabaseAuth.requireRole();
        if (!role) return;
        var allMessages = [];
        var currentFilter = 'all';
        function render(filter) {
            filter = filter || currentFilter; currentFilter = filter;
            var items = filter === 'all' ? allMessages : allMessages.filter(function(m) { return m.status === filter; });
            var counts = { all: allMessages.length, unread: 0, read: 0, replied: 0 };
            allMessages.forEach(function(m) { if (counts[m.status] !== undefined) counts[m.status]++; });
            document.getElementById('countAll').textContent = counts.all;
            document.getElementById('countUnread').textContent = counts.unread;
            document.getElementById('countRead').textContent = counts.read;
            document.getElementById('countReplied').textContent = counts.replied;
            if (!items.length) { document.getElementById('msgList').innerHTML = '<div style="text-align:center;padding:40px;color:var(--text-muted);"><i class="fas fa-inbox"></i><p>لا توجد رسائل</p></div>'; return; }
            var html = '';
            items.forEach(function(m) {
                var deptNames = { general: 'عام', membership: 'عضوية', finance: 'مالي', legal: 'قانوني', complaint: 'شكوى' };
                html += '<div class="msg-card' + (m.status === 'unread' ? ' unread' : '') + '" data-id="' + m.id + '">';
                html += '<div class="msg-subject">' + m.subject + ' <span class="msg-badge">' + (deptNames[m.department] || m.department) + '</span></div>';
                html += '<div class="msg-meta"><span>' + m.name + '</span><span>' + m.email + '</span><span>' + new Date(m.created_at).toLocaleDateString('ar-MR') + '</span></div>';
                html += '<div class="msg-preview">' + (m.message ? m.message.substring(0, 100) : '') + '...</div></div>';
            });
            document.getElementById('msgList').innerHTML = html;
        }
        document.querySelectorAll('.msg-filters button').forEach(function(b) {
            b.addEventListener('click', function() { document.querySelectorAll('.msg-filters button').forEach(function(x) { x.classList.remove('active'); }); this.classList.add('active'); render(this.getAttribute('data-filter')); });
        });
        document.getElementById('msgList').addEventListener('click', function(e) {
            var card = e.target.closest('.msg-card');
            if (!card) return;
            var id = parseInt(card.getAttribute('data-id'));
            var msg = allMessages.find(function(m) { return m.id === id; });
            if (!msg) return;
            var deptNames = { general: 'عام', membership: 'عضوية', finance: 'مالي', legal: 'قانوني', complaint: 'شكوى' };
            alert('من: ' + msg.name + ' (' + msg.email + ')\nالقسم: ' + (deptNames[msg.department] || msg.department) + '\nالموضوع: ' + msg.subject + '\n\n' + msg.message + '\n\n---\n' + new Date(msg.created_at).toLocaleString('ar-MR'));
            if (msg.status === 'unread') {
                fetch('https://bfdixkdwhccriliwtnch.supabase.co/rest/v1/contact_messages?id=eq.' + id, { method: 'PATCH', headers: { 'Content-Type': 'application/json', 'apikey': 'sb_publishable_Y3FsxqV_4RA96t7MassN4w_NcOJ31--', 'Authorization': 'Bearer ' + SupabaseAuth.getToken() }, body: JSON.stringify({ status: 'read' }) }).catch(function(){});
                msg.status = 'read';
                render(currentFilter);
            }
        });
        (async function load() {
            try {
                var token = SupabaseAuth.getToken();
                var res = await fetch('https://bfdixkdwhccriliwtnch.supabase.co/rest/v1/contact_messages?order=created_at.desc', { headers: { 'apikey': 'sb_publishable_Y3FsxqV_4RA96t7MassN4w_NcOJ31--', 'Authorization': 'Bearer ' + token } });
                if (res.ok) { allMessages = await res.json() || []; }
            } catch(e) {}
            render('all');
        })();
    })();
    </script>
