<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>الرسائل - لوحة التحكم</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link rel="stylesheet" href="../css/style.css" />
    <link rel="stylesheet" href="../css/control.css" />
    <script src="../js/supabase.js"></script>
</head>
<body class="control-page">
    <div class="control-wrapper">
        <div class="menu">
            <div class="profile">
                <div class="img-box"><img src="../images/logoNikabo.png" alt="الشعار" /></div>
                <h2>الإدارة</h2>
            </div>
            <ul>
                <li><a href="dashboard.html"><i class="fas fa-chart-pie"></i><span>الرئيسية</span></a></li>
                <li><a href="members.html"><i class="fas fa-users"></i><span>الأعضاء</span></a></li>
                <li><a href="news_manage.html"><i class="fas fa-newspaper"></i><span>الأخبار</span></a></li>
                <li><a href="events_manage.html"><i class="fas fa-calendar-alt"></i><span>الفعاليات</span></a></li>
                <li><a href="messages_manage.html" class="active"><i class="fas fa-envelope"></i><span>الرسائل</span><span class="badge" id="msgBadge">0</span></a></li>
                <li><a href="settings.html"><i class="fas fa-cog"></i><span>الإعدادات</span></a></li>
                <li class="logout"><a href="javascript:void(0)" onclick="SB.logout();window.location.href='ctrl_login.html'"><i class="fas fa-sign-out-alt"></i><span>تسجيل خروج</span></a></li>
            </ul>
        </div>

        <main class="content">
            <div class="control-header">
                <h1><i class="fas fa-envelope"></i> إدارة الرسائل</h1>
                <div class="header-left"><span>مرحباً، <strong id="adminName">المشرف</strong></span></div>
            </div>

            <div class="stats-grid" style="grid-template-columns:repeat(4,1fr);">
                <div class="stat-widget red"><div class="stat-icon"><i class="fas fa-envelope-open-text"></i></div><div class="stat-number" id="statUnread">0</div><div class="stat-label">غير مقروءة</div></div>
                <div class="stat-widget gold"><div class="stat-icon"><i class="fas fa-envelope"></i></div><div class="stat-number" id="statRead">0</div><div class="stat-label">مقروءة</div></div>
                <div class="stat-widget green"><div class="stat-icon"><i class="fas fa-reply"></i></div><div class="stat-number" id="statReplied">0</div><div class="stat-label">تم الرد</div></div>
                <div class="stat-widget blue"><div class="stat-icon"><i class="fas fa-inbox"></i></div><div class="stat-number" id="statTotal">0</div><div class="stat-label">الإجمالي</div></div>
            </div>

            <div class="section-card">
                <div class="table-wrap">
                    <table>
                        <thead>
                            <tr><th>المرسل</th><th>البريد</th><th>الموضوع</th><th>التاريخ</th><th>الحالة</th><th>الإجراءات</th></tr>
                        </thead>
                        <tbody id="messagesBody"></tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script>
        SB.requireAuth('ctrl_login.html', true);

        async function loadMessages() {
            try {
                var data = await SB.api('contact_messages', 'select=*&order=created_at.desc');
                var unread = 0, read = 0, replied = 0;
                data.forEach(function(m) {
                    if (!m.is_read) unread++;
                    else if (m.is_replied) replied++;
                    else read++;
                });
                document.getElementById('statUnread').textContent = unread;
                document.getElementById('statRead').textContent = read;
                document.getElementById('statReplied').textContent = replied;
                document.getElementById('statTotal').textContent = data.length;
                document.getElementById('msgBadge').textContent = unread;

                var tbody = document.getElementById('messagesBody');
                tbody.innerHTML = data.map(function(m) {
                    var st = !m.is_read ? 'pending' : m.is_replied ? 'active' : 'approved';
                    var stText = st === 'pending' ? 'جديد' : st === 'active' ? 'تم الرد' : 'مقروءة';
                    var bold = st === 'pending' ? ' style="font-weight:700;"' : '';
                    var date = m.created_at ? new Date(m.created_at).toLocaleDateString('ar') : '';
                    return '<tr' + bold + '>' +
                        '<td><div class="user-cell"><div class="avatar-placeholder" style="width:28px;height:28px;font-size:12px;">' + ((m.name || 'م')[0]) + '</div> ' + (m.name || '') + '</div></td>' +
                        '<td>' + (m.email || '') + '</td>' +
                        '<td>' + (m.subject || '').substring(0, 40) + '</td>' +
                        '<td>' + date + '</td>' +
                        '<td><span class="status-badge ' + st + '">' + stText + '</span></td>' +
                        '<td><div class="action-btns">' +
                        (st === 'pending' ? '<a href="#" class="btn-view" data-id="' + m.id + '" title="تحديد مقروء"><i class="fas fa-eye"></i></a>' : '') +
                        '<a href="#" class="btn-delete" data-id="' + m.id + '"><i class="fas fa-trash"></i></a>' +
                        '</div></td></tr>';
                }).join('');

                document.querySelectorAll('.btn-view').forEach(function(a) {
                    a.addEventListener('click', async function(e) {
                        e.preventDefault();
                        await SB.api('contact_messages', 'id=eq.' + this.dataset.id, { is_read: true }, 'PATCH');
                        loadMessages();
                    });
                });
                document.querySelectorAll('.btn-delete').forEach(function(a) {
                    a.addEventListener('click', async function(e) {
                        e.preventDefault();
                        if (confirm('حذف هذه الرسالة؟')) {
                            await SB.api('contact_messages', 'id=eq.' + this.dataset.id, null, 'DELETE');
                            loadMessages();
                        }
                    });
                });
            } catch(e) { console.warn(e); }
        }

        document.getElementById('adminName').textContent = (JSON.parse(localStorage.getItem('member') || sessionStorage.getItem('member') || '{}')).full_name || 'المشرف';
        loadMessages();
    </script>
</body>
</html>
