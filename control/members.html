<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>إدارة الأعضاء - لوحة التحكم</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link rel="stylesheet" href="../css/style.css" />
    <link rel="stylesheet" href="../css/control.css" />
</head>
<body class="control-page">
    <div class="control-wrapper">
        <div class="menu">
            <div class="profile">
                <div class="img-box"><img src="../images/logoNikabo.png" alt="الشعار" /></div>
                <h2 id="adminName">النقيب</h2>
            </div>
            <ul>
                <li><a href="dashboard.html"><i class="fas fa-chart-pie"></i><span>الرئيسية</span></a></li>
                <li><a href="members.html" class="active"><i class="fas fa-users"></i><span>الأعضاء</span></a></li>
                <li><a href="news_manage.html"><i class="fas fa-newspaper"></i><span>الأخبار</span></a></li>
                <li><a href="events_manage.html"><i class="fas fa-calendar-alt"></i><span>الفعاليات</span></a></li>
                <li class="logout"><a href="javascript:void(0)" onclick="logout()"><i class="fas fa-sign-out-alt"></i><span>تسجيل الخروج</span></a></li>
            </ul>
        </div>

        <div class="content">
            <div class="control-header">
                <h1>الأعضاء</h1>
                <div class="header-left">
                    <div class="admin-info"><span id="adminEmail"></span></div>
                </div>
            </div>

            <div class="section-card">
                <h2>جميع الأعضاء</h2>
                <div id="membersList"></div>
            </div>
        </div>
    </div>
    <script src="../js/supabase.js"></script>
    <script>
        var user;
        function logout() { SB.clearSession(); window.location.href = 'ctrl_login.html'; }

        document.addEventListener('DOMContentLoaded', function() {
            user = SB.requireAuth('ctrl_login.html');
            if (!user) return;
            SB.api('GET', '/rest/v1/members?select=is_admin,full_name&user_id=eq.' + user.id).then(function(m) {
                var p = Array.isArray(m) ? m[0] : null;
                if (!p || !p.is_admin) { alert('غير مصرح'); SB.clearSession(); window.location.href = 'ctrl_login.html'; return; }
                if (p.full_name) document.getElementById('adminName').textContent = p.full_name;
            });
            document.getElementById('adminEmail').textContent = user.email;
            loadMembers();
        });

        function loadMembers() {
            SB.api('GET', '/rest/v1/members?select=*&order=created_at.desc').then(function(d) {
                if (!Array.isArray(d) || d.length === 0) { document.getElementById('membersList').innerHTML = '<div class="empty-state"><i class="fas fa-users"></i><h3>لا يوجد أعضاء</h3></div>'; return; }
                var h = '<div class="table-wrap"><table><thead><tr><th>الاسم</th><th>البريد</th><th>الهاتف</th><th>التخصص</th><th>الحالة</th><th>إجراءات</th></tr></thead><tbody>';
                for (var i = 0; i < d.length; i++) {
                    var m = d[i];
                    var stClass = m.membership_status === 'approved' ? 'approved' : m.membership_status === 'rejected' ? 'rejected' : 'pending';
                    var stText = m.membership_status === 'approved' ? 'معتمد' : m.membership_status === 'rejected' ? 'مرفوض' : 'قيد الانتظار';
                    var statusColor = m.membership_status === 'approved' ? 'var(--success)' : m.membership_status === 'rejected' ? 'var(--danger)' : '#f59e0b';
                    h += '<tr><td>' + SB.esc(m.full_name) + '</td><td>' + SB.esc(m.email) + '</td><td>' + SB.esc(m.phone || '') + '</td><td>' + SB.esc(m.professional_type || '') + '</td>';
                    h += '<td><span class="status-badge ' + stClass + '">' + stText + '</span></td>';
                    h += '<td><div class="action-btns">';
                    if (m.membership_status !== 'approved') h += '<button class="btn-approve" onclick="updateStatus(' + m.id + ',\'approved\')" title="اعتماد"><i class="fas fa-check"></i></button>';
                    if (m.membership_status !== 'rejected') h += '<button class="btn-reject" onclick="updateStatus(' + m.id + ',\'rejected\')" title="رفض"><i class="fas fa-times"></i></button>';
                    h += '<button class="btn-delete" onclick="deleteMember(' + m.id + ')" title="حذف"><i class="fas fa-trash"></i></button>';
                    h += '</div></td></tr>';
                }
                h += '</tbody></table></div>';
                document.getElementById('membersList').innerHTML = h;
            }).catch(function() {});
        }

        function updateStatus(id, status) {
            SB.api('PATCH', '/rest/v1/members?id=eq.' + id, { membership_status: status }).then(function() { loadMembers(); });
        }

        function deleteMember(id) {
            if (!confirm('هل أنت متأكد من حذف هذا العضو؟')) return;
            SB.api('GET', '/rest/v1/members?select=user_id&id=eq.' + id).then(function(d) {
                var m = Array.isArray(d) ? d[0] : null;
                SB.api('DELETE', '/rest/v1/members?id=eq.' + id).then(function() {
                    if (m && m.user_id) SB.api('DELETE', '/rest/v1/auth/admin/users/' + m.user_id);
                    loadMembers();
                });
            });
        }
    </script>
</body>
</html>
