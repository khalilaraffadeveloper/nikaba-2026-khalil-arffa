<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>سجل المعاملات - النظام المالي</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link rel="stylesheet" href="../css/style.css" />
    <link rel="stylesheet" href="../css/control.css" />
</head>
<body class="control-page">
    <div class="control-wrapper">
        <div class="menu">
            <div class="profile">
                <div class="img-box"><img src="../images/logoNikabo.png" alt="الشعار" /></div>
                <h2 id="adminName">النقيب</h2>
            </div>
            <ul>
                <li><a href="dashboard.html"><i class="fas fa-chart-pie"></i><span>الرئيسية</span></a></li>
                <li><a href="applications.html"><i class="fas fa-file-signature"></i><span>الطلبات</span></a></li>
                <li><a href="members.html"><i class="fas fa-users"></i><span>الأعضاء</span></a></li>
                <li><a href="content_manage.html"><i class="fas fa-edit"></i><span>المحتوى</span></a></li>
                <li><a href="news_manage.html"><i class="fas fa-newspaper"></i><span>الأخبار</span></a></li>
                <li><a href="events_manage.html"><i class="fas fa-calendar-alt"></i><span>الفعاليات</span></a></li>
                <li><a href="gallery_manage.html"><i class="fas fa-images"></i><span>المعرض</span></a></li>
                <li><a href="messages_manage.html"><i class="fas fa-envelope"></i><span>الرسائل</span></a></li>
                <li><a href="finance.html"><i class="fas fa-coins"></i><span>النظام المالي</span></a></li>
                <li><a href="treasury.html"><i class="fas fa-landmark"></i><span>الخزنة</span></a></li>
                <li><a href="settings.html"><i class="fas fa-cog"></i><span>الإعدادات</span></a></li>
                <li class="logout"><a href="javascript:void(0)" onclick="SB.logout();window.location.href='ctrl_login.html'"><i class="fas fa-sign-out-alt"></i><span>تسجيل خروج</span></a></li>
            </ul>
        </div>

        <main class="content">
            <div class="control-header">
                <h1><i class="fas fa-history"></i> سجل المعاملات</h1>
                <div class="header-left">
                    <a href="finance.html" class="btn-secondary" style="margin:0;padding:8px 18px;font-size:13px;"><i class="fas fa-arrow-right"></i> العودة</a>
                    <button class="btn-primary-sm" onclick="exportCSV()" style="background:var(--success);"><i class="fas fa-file-export"></i> تصدير</button>
                </div>
            </div>

            <div style="display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;">
                <button class="btn-secondary filter-btn" style="margin:0;padding:8px 18px;font-size:12px;background:var(--accent);color:#0a0a14;border-color:var(--accent);" onclick="filterType('all')">الكل (<span id="countAll">0</span>)</button>
                <button class="btn-secondary filter-btn" style="margin:0;padding:8px 18px;font-size:12px;" onclick="filterType('purchase')"><i class="fas fa-arrow-up"></i> شراء (<span id="countPurchase">0</span>)</button>
                <button class="btn-secondary filter-btn" style="margin:0;padding:8px 18px;font-size:12px;" onclick="filterType('transfer')"><i class="fas fa-arrow-right"></i> تحويل (<span id="countTransfer">0</span>)</button>
                <button class="btn-secondary filter-btn" style="margin:0;padding:8px 18px;font-size:12px;" onclick="filterType('donation')"><i class="fas fa-hand-holding-heart"></i> تبرع (<span id="countDonation">0</span>)</button>
                <button class="btn-secondary filter-btn" style="margin:0;padding:8px 18px;font-size:12px;" onclick="filterType('deduction')"><i class="fas fa-trash"></i> خصم (<span id="countDeduction">0</span>)</button>
            </div>

            <div class="section-card" style="padding:14px;">
                <div style="display:flex;gap:12px;align-items:end;flex-wrap:wrap;">
                    <div class="form-group" style="margin:0;flex:1;min-width:120px;">
                        <label style="font-size:12px;">من تاريخ</label>
                        <input type="date" id="filterDateFrom" style="padding:8px 10px;font-size:12px;" />
                    </div>
                    <div class="form-group" style="margin:0;flex:1;min-width:120px;">
                        <label style="font-size:12px;">إلى تاريخ</label>
                        <input type="date" id="filterDateTo" style="padding:8px 10px;font-size:12px;" />
                    </div>
                    <div class="form-group" style="margin:0;flex:1;min-width:120px;">
                        <label style="font-size:12px;">النوع</label>
                        <select id="filterTypeSelect" style="padding:8px 10px;font-size:12px;">
                            <option value="all">الكل</option>
                            <option value="purchase">شراء</option>
                            <option value="transfer">تحويل</option>
                            <option value="donation">تبرع</option>
                            <option value="deduction">خصم</option>
                        </select>
                    </div>
                    <button class="btn-primary-sm" onclick="loadTransactions()" style="height:36px;"><i class="fas fa-filter"></i> تصفية</button>
                </div>
            </div>

            <div class="section-card">
                <div class="table-wrap">
                    <table>
                        <thead>
                            <tr>
                                <th>#</th>
                                <th>النوع</th>
                                <th>من</th>
                                <th>إلى</th>
                                <th>المبلغ</th>
                                <th>التاريخ</th>
                                <th>السبب / ملاحظة</th>
                                <th>بواسطة</th>
                            </tr>
                        </thead>
                        <tbody id="transactionsBody">
                            <tr><td colspan="8" style="text-align:center;color:var(--text-muted);font-size:13px;padding:24px;">جاري التحميل...</td></tr>
                        </tbody>
                    </table>
                </div>

                <div style="display:flex;justify-content:space-between;align-items:center;margin-top:16px;font-size:13px;color:var(--text-muted);">
                    <span id="paginationInfo">عرض 0-0 من 0</span>
                    <div style="display:flex;gap:6px;" id="paginationControls"></div>
                </div>
            </div>
        </main>
    </div>

    <script src="../js/supabase.js"></script>
    <script>
        var user;
        var currentPage = 1;
        var pageSize = 20;
        var currentFilter = 'all';

        function logout() { SB.clearSession(); window.location.href = 'ctrl_login.html'; }

        document.addEventListener('DOMContentLoaded', function() {
            user = SB.requireAuth('ctrl_login.html', true);
            if (!user) return;
            SB.api('GET', '/rest/v1/members?select=is_admin,full_name&user_id=eq.' + user.id).then(function(members) {
                var profile = Array.isArray(members) ? members[0] : null;
                if (!profile || !profile.is_admin) { alert('غير مصرح لك بالدخول'); SB.clearSession(); window.location.href = '../pages/ashatari.html'; return; }
                if (profile.full_name) document.getElementById('adminName').textContent = profile.full_name;
            });
            document.getElementById('adminEmail').textContent = user.email;
            loadCounts();
            loadTransactions();
        });

        function loadCounts() {
            SB.api('GET', '/rest/v1/finance_transactions?select=type').then(function(rows) {
                if (!Array.isArray(rows)) return;
                var all = rows.length;
                var purchase = 0, transfer = 0, donation = 0, deduction = 0;
                for (var i = 0; i < rows.length; i++) {
                    var t = rows[i].type;
                    if (t === 'purchase') purchase++;
                    else if (t === 'transfer') transfer++;
                    else if (t === 'donation') donation++;
                    else if (t === 'deduction') deduction++;
                }
                document.getElementById('countAll').textContent = all;
                document.getElementById('countPurchase').textContent = purchase;
                document.getElementById('countTransfer').textContent = transfer;
                document.getElementById('countDonation').textContent = donation;
                document.getElementById('countDeduction').textContent = deduction;
            }).catch(function() {});
        }

        function filterType(type) {
            currentFilter = type;
            document.getElementById('filterTypeSelect').value = type;
            currentPage = 1;
            loadTransactions();
        }

        function loadTransactions() {
            var url = '/rest/v1/finance_transactions?select=*&order=created_at.desc';
            var type = document.getElementById('filterTypeSelect').value;
            var dateFrom = document.getElementById('filterDateFrom').value;
            var dateTo = document.getElementById('filterDateTo').value;
            if (type !== 'all') url += '&type=eq.' + type;
            if (dateFrom) url += '&created_at=gte.' + dateFrom;
            if (dateTo) url += '&created_at=lte.' + dateTo + 'T23:59:59';
            url += '&limit=' + pageSize + '&offset=' + ((currentPage - 1) * pageSize);

            SB.api('GET', url).then(function(rows) {
                var tbody = document.getElementById('transactionsBody');
                if (!rows || rows.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;color:var(--text-muted);font-size:13px;padding:24px;">لا توجد معاملات</td></tr>';
                    return;
                }
                var html = '';
                for (var i = 0; i < rows.length; i++) {
                    var r = rows[i];
                    html += '<tr>';
                    html += '<td>' + ((currentPage - 1) * pageSize + i + 1) + '</td>';
                    html += '<td>' + (r.type || '-') + '</td>';
                    html += '<td>' + (r.from_member || '-') + '</td>';
                    html += '<td>' + (r.to_member || '-') + '</td>';
                    html += '<td><strong>' + (r.amount || '0') + '</strong></td>';
                    html += '<td>' + (r.created_at || '-') + '</td>';
                    html += '<td>' + (r.reason || '-') + '</td>';
                    html += '<td>' + (r.created_by || '-') + '</td>';
                    html += '</tr>';
                }
                tbody.innerHTML = html;
                document.getElementById('paginationInfo').textContent = 'عرض ' + ((currentPage - 1) * pageSize + 1) + '-' + ((currentPage - 1) * pageSize + rows.length);
            }).catch(function() {});
        }
    </script>
</body>
</html>
