<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>إدارة المرشحين - لوحة التحكم</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link rel="stylesheet" href="../css/style.css" />
    <link rel="stylesheet" href="../css/control.css" />
    <script src="../js/supabase.js"></script>
</head>
<body class="control-page">
    <div class="control-wrapper">
        <div class="menu">
            <div class="profile">
                <div class="img-box">
                    <img src="../images/logoNikabo.png" alt="الشعار" />
                </div>
                <h2 id="adminName">النقيب</h2>
            </div>
            <ul>
                <li><a href="dashboard.html"><i class="fas fa-chart-pie"></i><span>الرئيسية</span></a></li>
                <li><a href="applications.html"><i class="fas fa-file-signature"></i><span>الطلبات</span></a></li>
                <li><a href="members.html"><i class="fas fa-users"></i><span>الأعضاء</span></a></li>
                <li><a href="content_manage.html"><i class="fas fa-edit"></i><span>المحتوى</span></a></li>
                <li><a href="news_manage.html"><i class="fas fa-newspaper"></i><span>الأخبار</span></a></li>
                <li><a href="events_manage.html"><i class="fas fa-calendar-alt"></i><span>الفعاليات</span></a></li>
                <li><a href="gallery_manage.html"><i class="fas fa-images"></i><span>المعرض</span></a></li>
                <li><a href="messages_manage.html"><i class="fas fa-envelope"></i><span>الرسائل</span></a></li>
                <li><a href="elections.html"><i class="fas fa-vote-yea"></i><span>الانتخابات</span></a></li>
                <li><a href="support_tickets.html"><i class="fas fa-headset"></i><span>الدعم</span></a></li>
                <li><a href="finance.html"><i class="fas fa-coins"></i><span>النظام المالي</span></a></li>
                <li><a href="treasury.html"><i class="fas fa-landmark"></i><span>الخزنة</span></a></li>
                <li><a href="settings.html"><i class="fas fa-cog"></i><span>الإعدادات</span></a></li>
                <li class="logout"><a href="javascript:void(0)" onclick="SB.logout();window.location.href='ctrl_login.html'"><i class="fas fa-sign-out-alt"></i><span>تسجيل خروج</span></a></li>
            </ul>
        </div>

        <main class="content">
            <div class="control-header">
                <h1><i class="fas fa-user-tie"></i> إدارة المرشحين</h1>
                <div class="header-left">
                    <a href="elections.html" class="btn-secondary" style="margin:0; padding: 8px 18px; font-size:13px;"><i class="fas fa-arrow-right"></i> العودة</a>
                </div>
            </div>

            <!-- إحصائيات الترشيحات -->
            <div class="stats-grid" style="grid-template-columns: repeat(5, 1fr);">
                <div class="stat-widget gold"><div class="stat-icon"><i class="fas fa-file-signature"></i></div><div class="stat-number" id="statTotal">0</div><div class="stat-label">إجمالي الطلبات</div></div>
                <div class="stat-widget blue"><div class="stat-icon"><i class="fas fa-spinner"></i></div><div class="stat-number" id="statPending">0</div><div class="stat-label">قيد الدراسة</div></div>
                <div class="stat-widget green"><div class="stat-icon"><i class="fas fa-check-circle"></i></div><div class="stat-number" id="statApproved">0</div><div class="stat-label">مقبول</div></div>
                <div class="stat-widget red"><div class="stat-icon"><i class="fas fa-times-circle"></i></div><div class="stat-number" id="statRejected">0</div><div class="stat-label">مرفوض</div></div>
                <div class="stat-widget purple"><div class="stat-icon"><i class="fas fa-hourglass-start"></i></div><div class="stat-number" id="statReceived">0</div><div class="stat-label">مستلمة</div></div>
            </div>

            <!-- فلاتر -->
            <div style="display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap;">
                <button class="btn-secondary candidate-filter active" data-filter="all" style="margin:0; padding: 8px 18px; font-size:12px; background: var(--accent); color:#0a0a14; border-color:var(--accent);">الكل</button>
                <button class="btn-secondary candidate-filter" data-filter="pending" style="margin:0; padding: 8px 18px; font-size:12px;"><i class="fas fa-spinner"></i> قيد الدراسة</button>
                <button class="btn-secondary candidate-filter" data-filter="approved" style="margin:0; padding: 8px 18px; font-size:12px;"><i class="fas fa-check"></i> مقبول</button>
                <button class="btn-secondary candidate-filter" data-filter="rejected" style="margin:0; padding: 8px 18px; font-size:12px;"><i class="fas fa-times"></i> مرفوض</button>
            </div>

            <!-- بطاقات المرشحين -->
            <div style="display: grid; gap: 12px;" id="candidatesList"></div>
        </main>
    </div>

    <script>
    SB.requireAuth('ctrl_login.html', true);

    (function() {
        const member = JSON.parse(localStorage.getItem('member') || sessionStorage.getItem('member') || '{}');
        if (member.name) {
            document.getElementById('adminName').textContent = member.name;
        }
    })();

    let allCandidates = [];
    let currentFilter = 'all';

    async function loadCandidates() {
        try {
            allCandidates = await SB.api('election_candidates', 'select=*&order=created_at.desc');
            updateStats();
            renderCandidates();
        } catch(e) { console.warn('Failed to load candidates', e); }
    }

    function updateStats() {
        document.getElementById('statTotal').textContent = allCandidates.length;
        document.getElementById('statPending').textContent = allCandidates.filter(c => c.status === 'pending').length;
        document.getElementById('statApproved').textContent = allCandidates.filter(c => c.status === 'approved').length;
        document.getElementById('statRejected').textContent = allCandidates.filter(c => c.status === 'rejected').length;
        document.getElementById('statReceived').textContent = allCandidates.filter(c => c.status === 'received').length;
    }

    function renderCandidates() {
        let filtered = allCandidates;
        if (currentFilter !== 'all') {
            filtered = allCandidates.filter(c => c.status === currentFilter);
        }

        const list = document.getElementById('candidatesList');
        if (filtered.length === 0) {
            list.innerHTML = '<p style="color:var(--text-muted); text-align:center; padding:20px;">لا توجد طلبات ترشح حالياً</p>';
            return;
        }

        list.innerHTML = filtered.map(c => {
            const initial = (c.candidate_name || c.member_name || 'م').charAt(0);
            const statusClass = c.status === 'approved' ? 'active' : (c.status === 'rejected' ? 'closed' : 'pending');
            const statusText = c.status === 'approved' ? 'مقبول' : (c.status === 'rejected' ? 'مرفوض' : (c.status === 'received' ? 'مستلمة' : 'قيد الدراسة'));
            return `<div class="section-card" style="padding:14px;">
                <div style="display:flex;align-items:center;gap:12px;">
                    <div style="width:42px;height:42px;border-radius:50%;background:var(--bg-elevated);display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;color:var(--accent);">${initial}</div>
                    <div style="flex:1;min-width:0;">
                        <div style="font-size:14px;font-weight:500;">${c.candidate_name || c.member_name || 'مرشح'}</div>
                        <div style="font-size:12px;color:var(--text-muted);margin-top:2px;">${c.position || 'منصب غير محدد'} · ${c.email || ''}</div>
                    </div>
                    <span class="status-badge ${statusClass}" style="font-size:12px;padding:4px 12px;">${statusText}</span>
                    <div style="display:flex;gap:6px;">
                        ${c.status === 'pending' || c.status === 'received' ? `<button class="btn-primary-sm" onclick="updateCandidateStatus(${c.id},'approved')"><i class="fas fa-check"></i></button><button class="btn-secondary" style="margin:0;padding:6px 10px;" onclick="updateCandidateStatus(${c.id},'rejected')"><i class="fas fa-times"></i></button>` : ''}
                    </div>
                </div>
            </div>`;
        }).join('');
    }

    async function updateCandidateStatus(id, status) {
        if (!confirm('هل أنت متأكد من تغيير حالة هذا المرشح؟')) return;
        try {
            await SB.api('election_candidates', 'id=eq.' + id, { status }, 'PATCH');
            loadCandidates();
        } catch(e) { console.warn('Failed to update candidate', e); }
    }

    document.querySelectorAll('.candidate-filter').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.candidate-filter').forEach(b => { b.style.background=''; b.style.color=''; b.style.borderColor=''; });
            btn.style.background = 'var(--accent)';
            btn.style.color = '#0a0a14';
            btn.style.borderColor = 'var(--accent)';
            currentFilter = btn.dataset.filter;
            renderCandidates();
        });
    });

    loadCandidates();
    </script>
</body>
</html>
