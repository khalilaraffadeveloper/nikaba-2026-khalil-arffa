<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>تسجيل الدخول - لوحة التحكم</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link rel="stylesheet" href="../css/style.css" />
    <link rel="stylesheet" href="../css/control.css" />
</head>
<body class="control-page">
    <div class="login-page">
        <div class="login-box">
            <img src="../images/logoNikabo.png" alt="شعار النقابة" class="login-logo" />
            <h1>لوحة التحكم</h1>
            <p>نقابة المهن التمثيلية</p>
            <form id="loginForm">
                <div class="form-group">
                    <label><i class="fas fa-envelope"></i> البريد الإلكتروني</label>
                    <input type="email" id="loginEmail" placeholder="admin@nikaba.mr" required />
                </div>
                <div class="form-group">
                    <label><i class="fas fa-lock"></i> كلمة المرور</label>
                    <input type="password" id="loginPass" placeholder="••••••••" required />
                </div>
                <div id="loginError" style="color:#ef4444;font-size:13px;margin-bottom:8px;display:none;"></div>
                <button type="submit" class="btn-primary" id="loginBtn"><i class="fas fa-sign-in-alt"></i> تسجيل الدخول</button>
            </form>
        </div>
    </div>
    <script src="../js/supabase.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            var btn = document.getElementById('loginBtn');
            var err = document.getElementById('loginError');
            var email = document.getElementById('loginEmail').value;
            var pass = document.getElementById('loginPass').value;
            btn.disabled = true; btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري الدخول...';
            err.style.display = 'none';
            try {
                var d = await SB.login(email, pass);
                if (d.access_token) {
                    SB.saveSession(d.access_token, d.refresh_token, d.user);
                    var members = await SB.api('GET', '/rest/v1/members?select=is_admin&user_id=eq.' + d.user.id);
                    var profile = Array.isArray(members) ? members[0] : null;
                    if (profile && profile.is_admin) {
                        window.location.href = 'dashboard.html';
                    } else {
                        SB.clearSession();
                        err.textContent = 'ليس لديك صلاحية الدخول إلى لوحة التحكم';
                        err.style.display = 'block';
                        btn.disabled = false; btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> تسجيل الدخول';
                    }
                } else {
                    err.textContent = d.msg || d.error_description || 'فشل تسجيل الدخول';
                    err.style.display = 'block';
                    btn.disabled = false; btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> تسجيل الدخول';
                }
            } catch(e) {
                err.textContent = 'خطأ في الاتصال';
                err.style.display = 'block';
                btn.disabled = false; btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> تسجيل الدخول';
            }
        });
    </script>
</body>
</html>
