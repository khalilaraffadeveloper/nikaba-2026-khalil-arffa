<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>طلبات العضوية - لوحة التحكم</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link rel="stylesheet" href="../css/style.css" />
    <link rel="stylesheet" href="../css/control.css" />
    <script src="../js/supabase.js"></script>
    <style>
        .app-filters { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:16px; }
        .app-filters button { padding:6px 16px; border-radius:20px; border:1px solid var(--border); background:var(--bg-card); color:var(--text-secondary); cursor:pointer; font-size:12px; }
        .app-filters button.active { background:var(--accent); color:#000; border-color:var(--accent); }
        .app-filters button .count { font-size:10px; opacity:.7; margin-right:4px; }
        .app-card { background:var(--bg-card); border:1px solid var(--border); border-radius:12px; padding:16px; margin-bottom:12px; cursor:pointer; }
        .app-card:hover { border-color:var(--accent); }
        .app-card .header { display:flex; justify-content:space-between; align-items:start; margin-bottom:8px; }
        .app-card .name { font-size:15px; font-weight:700; }
        .app-card .email { font-size:12px; color:var(--text-muted); }
        .app-card .meta { display:flex; gap:12px; flex-wrap:wrap; font-size:12px; color:var(--text-muted); }
        .app-card .meta span { display:flex; align-items:center; gap:4px; }
        .badge-pending { background:rgba(245,200,66,.15); color:var(--accent); padding:2px 10px; border-radius:10px; font-size:11px; }
        .badge-approved { background:rgba(100,200,100,.15); color:#4caf50; padding:2px 10px; border-radius:10px; font-size:11px; }
        .badge-rejected { background:rgba(200,80,80,.15); color:#e74c3c; padding:2px 10px; border-radius:10px; font-size:11px; }
        .modal-overlay { display:none; position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,.6); z-index:1000; align-items:center; justify-content:center; }
        .modal-overlay.show { display:flex; }
        .modal-box { background:var(--bg-card); border:1px solid var(--border); border-radius:16px; max-width:600px; width:90%; max-height:85vh; overflow-y:auto; padding:24px; }
        .modal-box .detail-row { display:flex; padding:6px 0; border-bottom:1px solid rgba(255,255,255,.05); font-size:13px; }
        .modal-box .detail-row .label { width:140px; color:var(--text-muted); flex-shrink:0; }
        .modal-box .detail-row .value { flex:1; }
        .modal-box img { max-width:100%; max-height:200px; border-radius:8px; margin:4px 0; }
        .modal-box .form-group { margin-bottom:12px; }
        .modal-box .form-group label { display:block; font-size:12px; color:var(--text-muted); margin-bottom:4px; }
        .modal-box .form-group select, .modal-box .form-group textarea { width:100%; padding:8px 12px; border-radius:8px; border:1px solid var(--border); background:var(--bg); color:var(--text-primary); font-size:13px; }
        .modal-actions { display:flex; gap:10px; margin-top:16px; }
        .btn-approve { background:#4caf50; color:#fff; border:none; padding:8px 20px; border-radius:8px; cursor:pointer; font-size:13px; }
        .btn-reject { background:#e74c3c; color:#fff; border:none; padding:8px 20px; border-radius:8px; cursor:pointer; font-size:13px; }
        .btn-close { background:var(--bg); color:var(--text-secondary); border:1px solid var(--border); padding:8px 20px; border-radius:8px; cursor:pointer; font-size:13px; }
        .empty-state { text-align:center; padding:40px; color:var(--text-muted); }
        .empty-state i { font-size:48px; margin-bottom:12px; }
        #loading { text-align:center; padding:40px; color:var(--text-muted); }
    </style>
</head>
<body class="control-page">
    <div class="control-wrapper">
        <div class="menu">
            <div class="profile">
                <div class="img-box"><img src="../images/logoNikabo.png" alt="الشعار" /></div>
                <h2>الإدارة</h2>
            </div>
            <ul>
                <li><a href="dashboard.html"><i class="fas fa-chart-pie"></i><span>الرئيسية</span></a></li>
                <li><a href="applications.html" class="active"><i class="fas fa-file-signature"></i><span>طلبات العضوية</span><span class="badge" id="sidebarCount">0</span></a></li>
                <li><a href="members.html"><i class="fas fa-users"></i><span>الأعضاء</span></a></li>
                <li><a href="news_manage.html"><i class="fas fa-newspaper"></i><span>الأخبار</span></a></li>
                <li><a href="events_manage.html"><i class="fas fa-calendar-alt"></i><span>الفعاليات</span></a></li>
                <li><a href="settings.html"><i class="fas fa-cog"></i><span>الإعدادات</span></a></li>
                <li class="logout"><a href="javascript:void(0)" onclick="SB.logout();window.location.href='ctrl_login.html'"><i class="fas fa-sign-out-alt"></i><span>تسجيل خروج</span></a></li>
            </ul>
        </div>

        <div class="content">
            <div class="control-header">
                <h1><i class="fas fa-file-signature"></i> طلبات العضوية</h1>
                <div class="header-left"><span>مرحباً، <strong id="adminName">المشرف</strong></span></div>
            </div>

            <div class="app-filters">
                <button class="active" onclick="setFilter('all')">الكل <span class="count" id="countAll">0</span></button>
                <button onclick="setFilter('pending')">قيد المراجعة <span class="count" id="countPending">0</span></button>
                <button onclick="setFilter('approved')">مقبول <span class="count" id="countApproved">0</span></button>
                <button onclick="setFilter('rejected')">مرفوض <span class="count" id="countRejected">0</span></button>
            </div>

            <div id="loading"><i class="fas fa-spinner fa-spin"></i> جاري تحميل الطلبات...</div>
            <div id="appList"></div>
        </div>
    </div>

    <div class="modal-overlay" id="appModal" onclick="if(event.target===this)closeModal()">
        <div class="modal-box">
            <h3 id="modalTitle">تفاصيل الطلب</h3>
            <div id="modalBody"></div>
            <div class="modal-actions">
                <button class="btn-close" onclick="closeModal()">إغلاق</button>
            </div>
        </div>
    </div>

    <script>
        SB.requireAuth('ctrl_login.html', true);
        var allApps = [];
        var currentFilter = 'all';

        function setFilter(f) {
            currentFilter = f;
            document.querySelectorAll('.app-filters button').forEach(function(b) { b.classList.remove('active'); });
            event.target.classList.add('active');
            renderApps();
        }

        async function loadApps() {
            document.getElementById('loading').style.display = 'block';
            try {
                var data = await SB.api('membership_applications', 'select=*&order=created_at.desc');
                allApps = data || [];
                document.getElementById('loading').style.display = 'none';
                updateCounts();
                renderApps();
            } catch(err) {
                document.getElementById('loading').innerHTML = '<i class="fas fa-exclamation-triangle"></i> فشل تحميل الطلبات: ' + err.message;
            }
        }

        function updateCounts() {
            var counts = { all: allApps.length, pending: 0, approved: 0, rejected: 0 };
            allApps.forEach(function(a) {
                var s = (a.status || '').toLowerCase();
                if (counts[s] !== undefined) counts[s]++;
            });
            document.getElementById('countAll').textContent = counts.all;
            document.getElementById('countPending').textContent = counts.pending;
            document.getElementById('countApproved').textContent = counts.approved;
            document.getElementById('countRejected').textContent = counts.rejected;
            document.getElementById('sidebarCount').textContent = counts.pending;
        }

        function renderApps() {
            var list = document.getElementById('appList');
            var filtered = allApps;
            if (currentFilter !== 'all') filtered = allApps.filter(function(a) { return (a.status || '').toLowerCase() === currentFilter; });

            if (filtered.length === 0) {
                list.innerHTML = '<div class="empty-state"><i class="fas fa-inbox"></i><p>لا توجد طلبات</p></div>';
                return;
            }

            list.innerHTML = filtered.map(function(a) {
                var cls = 'badge-pending', txt = 'قيد المراجعة';
                if (a.status === 'approved') { cls = 'badge-approved'; txt = 'مقبول'; }
                if (a.status === 'rejected') { cls = 'badge-rejected'; txt = 'مرفوض'; }
                return '<div class="app-card" onclick="showApp(\'' + a.id + '\')">' +
                    '<div class="header"><div><div class="name">' + (a.full_name || 'غير معروف') + '</div><div class="email">' + (a.email || '') + '</div></div><div><span class="' + cls + '">' + txt + '</span></div></div>' +
                    '<div class="meta">' +
                    (a.phone ? '<span><i class="fas fa-phone"></i> ' + a.phone + '</span>' : '') +
                    (a.profession ? '<span><i class="fas fa-briefcase"></i> ' + a.profession + '</span>' : '') +
                    (a.created_at ? '<span><i class="fas fa-clock"></i> ' + new Date(a.created_at).toLocaleDateString('ar') + '</span>' : '') +
                    '</div></div>';
            }).join('');
        }

        function showApp(id) {
            var app = allApps.find(function(a) { return a.id === id; });
            if (!app) return;
            document.getElementById('modalTitle').textContent = 'تفاصيل طلب: ' + (app.full_name || '');

            var cls = 'badge-pending', txt = 'قيد المراجعة';
            if (app.status === 'approved') { cls = 'badge-approved'; txt = 'مقبول'; }
            if (app.status === 'rejected') { cls = 'badge-rejected'; txt = 'مرفوض'; }

            var html = '';
            html += '<div class="detail-row"><div class="label">الحالة</div><div class="value"><span class="' + cls + '">' + txt + '</span></div></div>';
            html += '<div class="detail-row"><div class="label">الاسم الكامل</div><div class="value">' + (app.full_name || '') + '</div></div>';
            html += '<div class="detail-row"><div class="label">رقم الهوية</div><div class="value">' + (app.national_id || '') + '</div></div>';
            html += '<div class="detail-row"><div class="label">تاريخ الميلاد</div><div class="value">' + (app.birth_date || '') + '</div></div>';
            html += '<div class="detail-row"><div class="label">الجنس</div><div class="value">' + (app.gender || '') + '</div></div>';
            html += '<div class="detail-row"><div class="label">البريد</div><div class="value">' + (app.email || '') + '</div></div>';
            html += '<div class="detail-row"><div class="label">الهاتف</div><div class="value">' + (app.phone || '') + '</div></div>';
            html += '<div class="detail-row"><div class="label">العنوان</div><div class="value">' + (app.address || '') + '</div></div>';
            html += '<div class="detail-row"><div class="label">المهنة</div><div class="value">' + (app.profession || '') + '</div></div>';
            html += '<div class="detail-row"><div class="label">التخصص</div><div class="value">' + (app.specialty || '') + '</div></div>';
            if (app.bio) html += '<div class="detail-row"><div class="label">نبذة</div><div class="value">' + app.bio + '</div></div>';

            if (app.status === 'pending' || !app.status) {
                html += '<div style="margin:16px 0;height:1px;background:var(--border);"></div>';
                html += '<h4 style="font-size:14px;margin-bottom:10px;"><i class="fas fa-tasks"></i> إجراءات</h4>';
                html += '<div class="form-group"><label>نوع العضوية</label><select id="membershipType"><option value="ذهبية">ذهبية</option><option value="فضية">فضية</option><option value="برونزية">برونزية</option></select></div>';
                html += '<div class="form-group"><label>ملاحظات (اختياري)</label><textarea id="approveNotes" rows="2" placeholder="ملاحظات حول القبول"></textarea></div>';
                html += '<div style="display:flex;gap:10px;">';
                html += '<button class="btn-approve" onclick="approveApp(\'' + app.id + '\')"><i class="fas fa-check"></i> قبول العضوية</button>';
                html += '<button class="btn-reject" onclick="showReject()"><i class="fas fa-times"></i> رفض</button></div>';
                html += '<div id="rejectForm" style="display:none;margin-top:12px;">';
                html += '<div class="form-group"><label>سبب الرفض <span style="color:var(--accent);">*</span></label>';
                html += '<textarea id="rejectReason" rows="2" placeholder="اذكر سبب رفض الطلب" required></textarea></div>';
                html += '<button class="btn-reject" onclick="rejectApp(\'' + app.id + '\')"><i class="fas fa-times"></i> تأكيد الرفض</button></div>';
            }

            document.getElementById('modalBody').innerHTML = html;
            document.getElementById('appModal').classList.add('show');
        }

        function showReject() { document.getElementById('rejectForm').style.display = 'block'; }
        function closeModal() { document.getElementById('appModal').classList.remove('show'); }

        async function approveApp(id) {
            if (!confirm('تأكيد قبول طلب العضوية؟')) return;
            var type = document.getElementById('membershipType').value;
            var notes = document.getElementById('approveNotes').value;
            try {
                var result = await SB.api('rpc/approve_application', null, { app_id: id, membership_type: type, notes: notes }, 'POST');
                if (result) {
                    alert('تم قبول الطلب بنجاح');
                } else {
                    // fallback: update directly
                    await SB.api('membership_applications', 'id=eq.' + id, { status: 'approved', review_notes: notes, reviewed_at: new Date().toISOString() }, 'PATCH');
                    alert('تم قبول الطلب بنجاح');
                }
                closeModal();
                loadApps();
            } catch(e) { alert('خطأ: ' + e.message); }
        }

        async function rejectApp(id) {
            var reason = document.getElementById('rejectReason').value;
            if (!reason) { alert('الرجاء إدخال سبب الرفض'); return; }
            if (!confirm('تأكيد رفض طلب العضوية؟')) return;
            try {
                await SB.api('membership_applications', 'id=eq.' + id, { status: 'rejected', review_notes: reason, reviewed_at: new Date().toISOString() }, 'PATCH');
                alert('تم رفض الطلب');
                closeModal();
                loadApps();
            } catch(e) { alert('خطأ: ' + e.message); }
        }

        document.getElementById('adminName').textContent = (JSON.parse(localStorage.getItem('member') || sessionStorage.getItem('member') || '{}')).full_name || 'المشرف';
        loadApps();
    </script>
</body>
</html>
