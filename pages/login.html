<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>تسجيل الدخول - نقابة المهن التمثيلية</title>
<link rel="stylesheet" href="../css/style.css" />
<style>
.auth-body { display:flex; align-items:center; justify-content:center; min-height:100vh; padding:20px; background:var(--bg); color:var(--text); font-family:system-ui,sans-serif; }
.auth-card { background:var(--bg-card); border-radius:var(--radius-xl); padding:32px 24px; width:100%; max-width:400px; box-shadow:var(--shadow-lg); }
.auth-card h2 { text-align:center; margin-bottom:8px; font-size:22px; }
.auth-card .sub { text-align:center; color:var(--text-secondary); font-size:14px; margin-bottom:28px; }
.form-group { margin-bottom:16px; }
.form-group label { display:block; font-size:13px; color:var(--text-secondary); margin-bottom:6px; }
.form-group input { width:100%; padding:14px 16px; background:var(--bg-elevated); border:1px solid var(--border); border-radius:var(--radius-sm); color:var(--text); font-size:15px; outline:none; transition:border-color 0.2s; box-sizing:border-box; }
.form-group input:focus { border-color:var(--accent); }
.btn-submit { width:100%; padding:14px; background:var(--accent-gradient); border:none; border-radius:var(--radius-sm); color:#0a0a14; font-size:16px; font-weight:700; cursor:pointer; transition:opacity 0.2s; }
.btn-submit:hover { opacity:0.9; }
.btn-submit:disabled { opacity:0.5; cursor:not-allowed; }
.auth-footer { text-align:center; margin-top:20px; font-size:14px; color:var(--text-secondary); }
.auth-footer a { color:var(--accent); font-weight:500; }
.msg { text-align:center; font-size:13px; margin-top:12px; min-height:20px; }
.msg.error { color:var(--danger); }
.msg.success { color:var(--success); }
.back-link { display:inline-flex; align-items:center; gap:6px; color:var(--text-secondary); font-size:13px; margin-bottom:20px; }
.back-link i { font-size:12px; }
</style>
</head>
<body class="auth-body">
  <div class="auth-card">
    <a href="../index.html" class="back-link">&larr; العودة للرئيسية</a>
    <h2>تسجيل الدخول</h2>
    <p class="sub">مرحباً بعودتك! سجل دخولك لحسابك النقابي</p>
    <form id="loginForm">
      <div class="form-group">
        <label>البريد الإلكتروني</label>
        <input type="email" id="email" placeholder="your@email.com" required />
      </div>
      <div class="form-group">
        <label>كلمة المرور</label>
        <input type="password" id="password" placeholder="......" required />
      </div>
      <button type="submit" class="btn-submit" id="submitBtn">تسجيل الدخول</button>
    </form>
    <div id="msg" class="msg"></div>
    <div class="auth-footer">
      ليس لديك حساب؟ <a href="register.html">طلب عضوية</a>
    </div>
  </div>
  <script>
    const SUPABASE_URL = 'https://bfdixkdwhccriliwtnch.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_Y3FsxqV_4RA96t7MassN4w_NcOJ31--';

    function saveSession(accessToken, refreshToken, user) {
      try {
        localStorage.setItem('sb-access-token', accessToken);
        localStorage.setItem('sb-refresh-token', refreshToken);
        localStorage.setItem('sb-user', JSON.stringify(user));
      } catch(e) { /* ignore */ }
    }

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const msg = document.getElementById('msg');
      const btn = document.getElementById('submitBtn');
      msg.className = 'msg';
      msg.textContent = 'جاري تسجيل الدخول...';
      btn.disabled = true;
      try {
        const r = await fetch(SUPABASE_URL + '/auth/v1/token?grant_type=password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'apikey': SUPABASE_KEY },
          body: JSON.stringify({ email: document.getElementById('email').value, password: document.getElementById('password').value })
        });
        const d = await r.json();
        if (d.access_token) {
          saveSession(d.access_token, d.refresh_token, d.user);
          msg.className = 'msg success';
          msg.textContent = 'تم تسجيل الدخول بنجاح!';
          setTimeout(() => window.location.href = 'dashboard.html', 1000);
        } else {
          msg.className = 'msg error';
          msg.textContent = d.msg || d.error_description || 'فشل تسجيل الدخول';
          btn.disabled = false;
        }
      } catch(err) {
        msg.className = 'msg error';
        msg.textContent = 'خطأ في الاتصال: ' + err.message;
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
