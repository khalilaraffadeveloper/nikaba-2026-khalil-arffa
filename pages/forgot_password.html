<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>استعادة كلمة المرور - نقابة المهن التمثيلية</title>
    <link rel="stylesheet" href="../css/style.css" />
    <style>
        .auth-body { display:flex; align-items:center; justify-content:center; min-height:100vh; padding:20px; background:var(--bg); color:var(--text); font-family:system-ui,sans-serif; }
        .auth-card { background:var(--bg-card); border-radius:var(--radius-xl); padding:32px 24px; width:100%; max-width:400px; box-shadow:var(--shadow-lg); }
        .auth-card h2 { text-align:center; margin-bottom:8px; font-size:22px; }
        .auth-card .sub { text-align:center; color:var(--text-secondary); font-size:14px; margin-bottom:28px; }
        .form-group { margin-bottom:16px; }
        .form-group label { display:block; font-size:13px; color:var(--text-secondary); margin-bottom:6px; }
        .form-group input { width:100%; padding:14px 16px; background:var(--bg-elevated); border:1px solid var(--border); border-radius:var(--radius-sm); color:var(--text); font-size:15px; outline:none; box-sizing:border-box; }
        .form-group input:focus { border-color:var(--accent); }
        .btn-submit { width:100%; padding:14px; background:var(--accent-gradient); border:none; border-radius:var(--radius-sm); color:#0a0a14; font-size:16px; font-weight:700; cursor:pointer; }
        .btn-submit:disabled { opacity:0.5; cursor:not-allowed; }
        .auth-footer { text-align:center; margin-top:20px; font-size:14px; color:var(--text-secondary); }
        .auth-footer a { color:var(--accent); font-weight:500; }
        .msg { text-align:center; font-size:13px; margin-top:12px; min-height:20px; }
        .msg.success { color:var(--success); }
        .msg.error { color:var(--danger); }
        .back-link { display:inline-flex; align-items:center; gap:6px; color:var(--text-secondary); font-size:13px; margin-bottom:20px; }
    </style>
</head>
<body class="auth-body">
    <div class="auth-card">
        <a href="login.html" class="back-link">&larr; العودة لتسجيل الدخول</a>
        <h2>استعادة كلمة المرور</h2>
        <p class="sub">أدخل بريدك الإلكتروني وسنرسل لك رابط إعادة تعيين كلمة المرور</p>
        <form id="forgotForm">
            <div class="form-group">
                <label>البريد الإلكتروني</label>
                <input type="email" id="email" placeholder="your@email.com" required />
            </div>
            <button type="submit" class="btn-submit" id="submitBtn">إرسال رابط الاستعادة</button>
        </form>
        <div id="msg" class="msg"></div>
        <div class="auth-footer">
            تذكرت كلمة المرور؟ <a href="login.html">تسجيل الدخول</a>
        </div>
    </div>
    <script src="../js/supabase.js"></script>
    <script>
        document.getElementById('forgotForm').addEventListener('submit', function(e) {
            e.preventDefault();
            var msg = document.getElementById('msg');
            var btn = document.getElementById('submitBtn');
            msg.className = 'msg';
            msg.textContent = 'جاري الإرسال...';
            btn.disabled = true;
            fetch(SB.URL + '/auth/v1/recover', {
                method: 'POST',
                headers: { 'apikey': SB.KEY, 'Content-Type': 'application/json' },
                body: JSON.stringify({ email: document.getElementById('email').value })
            }).then(function(r) { return r.json(); }).then(function(d) {
                msg.className = 'msg success';
                msg.textContent = 'تم إرسال رابط الاستعادة إلى بريدك الإلكتروني';
                btn.disabled = false;
            }).catch(function(err) {
                msg.className = 'msg error';
                msg.textContent = 'خطأ: ' + err.message;
                btn.disabled = false;
            });
        });
    </script>
</body>
</html>
