<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>الفعاليات - نقابة المهن التمثيلية</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link rel="stylesheet" href="../css/style.css" />
</head>
<body>
    <header class="site-header">
        <a href="index.html" class="sh-logo">
            <img src="../images/logoNikabo.png" alt="الشعار" />
            <h2>الفعاليات</h2>
        </a>
        <div class="sh-menu">
            <a href="login.html" class="sh-login"><i class="fas fa-sign-in-alt"></i> دخول</a>
            <a href="register.html" class="sh-register"><i class="fas fa-user-plus"></i></a>
        </div>
    </header>

    <main class="site-main">
        <div class="section-title fade-up"><i class="fas fa-calendar-alt"></i> جميع الفعاليات</div>
        <div id="eventsList"></div>
    </main>

    <nav class="site-bottom-nav">
        <a href="index.html"><i class="fas fa-home"></i><span>الرئيسية</span></a>
        <a href="news.html"><i class="fas fa-newspaper"></i><span>الأخبار</span></a>
        <a href="events.html" class="active"><i class="fas fa-calendar-alt"></i><span>الفعاليات</span></a>
        <a href="gallery.html"><i class="fas fa-images"></i><span>المعرض</span></a>
        <a href="contact.html"><i class="fas fa-headset"></i><span>اتصل بنا</span></a>
    </nav>

    <script src="../js/supabase.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            SB.api('GET', '/rest/v1/events?select=*&is_published=eq.true&order=created_at.desc').then(function(d) {
                var el = document.getElementById('eventsList');
                if (!Array.isArray(d) || d.length === 0) { el.innerHTML = '<div class="card" style="text-align:center;padding:24px;"><span style="color:var(--text-muted);">لا توجد فعاليات</span></div>'; return; }
                var h = '';
                for (var i = 0; i < d.length; i++) {
                    var item = d[i];
                    var dateParts = item.event_date ? item.event_date.split('-') : [];
                    var day = dateParts.length > 2 ? parseInt(dateParts[2]) : '';
                    var month = dateParts.length > 1 ? dateParts[1] : '';
                    var monthNames = {'01':'يناير','02':'فبراير','03':'مارس','04':'أبريل','05':'مايو','06':'يونيو','07':'يوليو','08':'أغسطس','09':'سبتمبر','10':'أكتوبر','11':'نوفمبر','12':'ديسمبر'};
                    h += '<div class="event-item"><a href="event_single.html?id=' + item.id + '" style="display:flex;gap:14px;text-decoration:none;color:inherit;width:100%;align-items:center;">';
                    if (day) h += '<div class="ei-date"><div class="ei-day">' + day + '</div><div class="ei-month">' + (monthNames[month] || month) + '</div></div>';
                    h += '<div class="ei-info"><div class="ei-title">' + SB.esc(item.title) + '</div>';
                    if (item.location) h += '<div class="ei-location"><i class="fas fa-map-marker-alt"></i> ' + item.location + '</div>';
                    h += '</div></a></div>';
                }
                el.innerHTML = h;
            }).catch(function() {
                document.getElementById('eventsList').innerHTML = '<div class="card" style="text-align:center;padding:24px;"><span style="color:var(--text-muted);">خطأ في التحميل</span></div>';
            });
        });
    </script>
</body>
</html>
