<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>تفاصيل الخبر - نقابة المهن التمثيلية</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link rel="stylesheet" href="../css/style.css" />
</head>
<body>
    <header class="site-header">
        <a href="news.html" class="sh-logo">
            <img src="../images/logoNikabo.png" alt="الشعار" />
            <h2>الأخبار</h2>
        </a>
        <div class="sh-menu">
            <a href="login.html" class="sh-login"><i class="fas fa-sign-in-alt"></i></a>
        </div>
    </header>

    <main class="site-main" id="app">
        <div id="loading" style="text-align:center;padding:40px;color:var(--text-muted);">جاري التحميل...</div>
        <div id="content" style="display:none;">
            <div class="news-detail-hero" id="heroImage">
                <div class="ndh-overlay">
                    <div class="ndh-cat" id="detailCategory"></div>
                    <div class="ndh-title" id="detailTitle"></div>
                </div>
            </div>
            <div class="nd-meta" id="detailMeta"></div>
            <div class="nd-body" id="detailBody"></div>
            <div class="nd-share" id="detailShare"></div>
            <a href="news.html" style="display:block;text-align:center;padding:14px;font-size:13px;font-weight:600;color:var(--accent);"><i class="fas fa-arrow-left"></i> العودة للأخبار</a>
        </div>
    </main>

    <script src="../js/supabase.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            var params = new URLSearchParams(window.location.search);
            var id = params.get('id');
            if (!id) { document.getElementById('app').innerHTML = '<div class="card" style="text-align:center;padding:40px;"><span style="color:var(--text-muted);">معرف الخبر غير صحيح</span></div>'; return; }
            SB.api('GET', '/rest/v1/news?id=eq.' + id + '&select=*').then(function(d) {
                var item = Array.isArray(d) ? d[0] : d;
                if (!item || !item.id) { document.getElementById('app').innerHTML = '<div class="card" style="text-align:center;padding:40px;"><span style="color:var(--text-muted);">الخبر غير موجود</span></div>'; return; }
                document.getElementById('loading').style.display = 'none';
                document.getElementById('content').style.display = 'block';
                document.title = item.title + ' - نقابة المهن التمثيلية';
                if (item.image_path) document.getElementById('heroImage').innerHTML = '<img src="' + item.image_path + '" alt="' + item.title + '" /><div class="ndh-overlay"><div class="ndh-cat">' + (item.category || '') + '</div><div class="ndh-title">' + item.title + '</div></div>';
                document.getElementById('detailCategory').textContent = item.category || '';
                document.getElementById('detailTitle').textContent = item.title;
                document.getElementById('detailMeta').innerHTML = '<span><i class="fas fa-clock"></i> ' + (item.event_date || '') + '</span>';
                document.getElementById('detailBody').innerHTML = item.content || item.summary || '';
                document.getElementById('detailShare').innerHTML = '<a href="https://www.facebook.com/sharer/sharer.php?u=' + encodeURIComponent(window.location.href) + '" target="_blank"><i class="fab fa-facebook-f"></i></a><a href="https://wa.me/?text=' + encodeURIComponent(item.title + ' ' + window.location.href) + '" target="_blank"><i class="fab fa-whatsapp"></i></a>';
            }).catch(function() {
                document.getElementById('app').innerHTML = '<div class="card" style="text-align:center;padding:40px;"><span style="color:var(--text-muted);">خطأ في التحميل</span></div>';
            });
        });
    </script>
</body>
</html>
