<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>الملف الشخصي - نقابة المهن التمثيلية</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link rel="stylesheet" href="../css/style.css" />
    <style>
        .profile-edit input, .profile-edit select, .profile-edit textarea { width:100%; padding:12px 14px; background:var(--bg-elevated); border:1px solid var(--border); border-radius:var(--radius-sm); color:var(--text); font-size:14px; margin-top:4px; }
        .profile-edit input:focus, .profile-edit select:focus { border-color:var(--accent); outline:none; }
        .profile-edit label { font-size:12px; color:var(--text-secondary); display:block; margin-top:12px; }
        .profile-edit .btn-save { width:100%; padding:14px; background:var(--accent-gradient); border:none; border-radius:var(--radius-sm); color:#0a0a14; font-size:16px; font-weight:700; cursor:pointer; margin-top:16px; }
    </style>
</head>
<body>
    <header class="site-header">
        <a href="ashatari.html" class="sh-logo">
            <img src="../images/logoNikabo.png" alt="الشعار" />
            <h2>ملفي الشخصي</h2>
        </a>
        <div class="sh-menu">
            <a href="javascript:void(0)" onclick="if(confirm('تسجيل الخروج؟')){ SB.clearSession(); window.location.href='../index.html'; }"><i class="fas fa-sign-out-alt"></i></a>
        </div>
    </header>

    <main class="site-main" id="app">
        <div id="loading" style="text-align:center;padding:40px;color:var(--text-muted);">جاري التحميل...</div>
        <div id="content" style="display:none;"></div>
    </main>

    <script src="../js/supabase.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            var user = SB.requireAuth('login.html');
            if (!user) return;

            SB.api('GET', '/rest/v1/members?select=*&user_id=eq.' + user.id).then(function(members) {
                var p = Array.isArray(members) ? members[0] : null;
                document.getElementById('loading').style.display = 'none';
                var el = document.getElementById('content');
                el.style.display = 'block';
                if (!p) {
                    el.innerHTML = '<div class="card" style="text-align:center;padding:30px;"><span style="color:var(--text-muted);">لم يتم إنشاء ملفك بعد</span></div>';
                    return;
                }
                el.innerHTML = '<div class="profile-header"><img src="' + (p.photo_url || '../images/logoNikabo.png') + '" class="ph-avatar" /><div class="ph-name">' + SB.esc(p.full_name) + '</div><div class="ph-title">' + SB.esc(p.professional_type || '') + '</div></div>' +
                    '<div class="card"><div class="profile-edit">' +
                    '<label>الاسم الكامل</label><input type="text" id="fullName" value="' + SB.esc(p.full_name) + '" />' +
                    '<label>رقم الهاتف</label><input type="tel" id="phone" value="' + SB.esc(p.phone || '') + '" />' +
                    '<label>التخصص</label><select id="profession"><option value="">اختر</option><option value="ممثل"' + (p.professional_type === 'ممثل' ? ' selected' : '') + '>ممثل</option><option value="مخرج"' + (p.professional_type === 'مخرج' ? ' selected' : '') + '>مخرج</option><option value="منتج"' + (p.professional_type === 'منتج' ? ' selected' : '') + '>منتج</option><option value="كاتب سيناريو"' + (p.professional_type === 'كاتب سيناريو' ? ' selected' : '') + '>كاتب سيناريو</option><option value="فني مسرح"' + (p.professional_type === 'فني مسرح' ? ' selected' : '') + '>فني مسرح</option><option value="أخرى"' + (p.professional_type === 'أخرى' ? ' selected' : '') + '>أخرى</option></select>' +
                    '<label>نبذة</label><textarea id="bio" rows="3">' + SB.esc(p.bio || '') + '</textarea>' +
                    '<button class="btn-save" onclick="saveProfile()"><i class="fas fa-save"></i> حفظ التغييرات</button>' +
                    '<div id="msg" class="msg" style="text-align:center;margin-top:12px;font-size:13px;"></div>' +
                    '</div></div>';
            }).catch(function() {
                document.getElementById('loading').textContent = 'خطأ في التحميل';
            });
        });

        function saveProfile() {
            var btn = document.querySelector('.btn-save');
            btn.disabled = true;
            btn.textContent = 'جاري الحفظ...';
            var data = {
                full_name: document.getElementById('fullName').value,
                phone: document.getElementById('phone').value,
                professional_type: document.getElementById('profession').value,
                bio: document.getElementById('bio').value
            };
            var user = SB.getUser();
            SB.api('PATCH', '/rest/v1/members?user_id=eq.' + user.id, data).then(function(r) {
                var msg = document.getElementById('msg');
                msg.className = 'msg success';
                msg.textContent = 'تم حفظ التغييرات بنجاح';
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-save"></i> حفظ التغييرات';
            }).catch(function() {
                var msg = document.getElementById('msg');
                msg.className = 'msg error';
                msg.textContent = 'خطأ في الحفظ';
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-save"></i> حفظ التغييرات';
            });
        }
    </script>
</body>
</html>
