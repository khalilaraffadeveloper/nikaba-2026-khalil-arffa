<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>تم تقديم الطلب - نقابة المهن التمثيلية</title>
    <link rel="stylesheet" href="../css/style.css" />
    <style>
        .auth-body { display:flex; align-items:center; justify-content:center; min-height:100vh; padding:20px; background:var(--bg); color:var(--text); font-family:system-ui,sans-serif; text-align:center; }
        .auth-card { background:var(--bg-card); border-radius:var(--radius-xl); padding:40px 24px; width:100%; max-width:400px; box-shadow:var(--shadow-lg); }
        .auth-card .icon { font-size:52px; color:var(--success); margin-bottom:12px; }
        .auth-card h2 { margin-bottom:8px; font-size:22px; }
        .auth-card p { color:var(--text-secondary); font-size:14px; margin-bottom:24px; line-height:1.6; }
        .btn-submit { display:inline-block; padding:14px 32px; background:var(--accent-gradient); border:none; border-radius:var(--radius-sm); color:#0a0a14; font-size:16px; font-weight:700; cursor:pointer; text-decoration:none; }
    </style>
</head>
<body class="auth-body">
    <div class="auth-card">
        <div class="icon"><i class="fas fa-check-circle"></i></div>
        <h2>تم تقديم طلب العضوية بنجاح!</h2>
        <p>سيتم مراجعة طلبك من قبل إدارة النقابة والرد عليك في أقرب وقت ممكن. يمكنك متابعة حالة طلبك من خلال لوحة التحكم.</p>
        <a href="ashatari.html" class="btn-submit">الذهاب للوحة التحكم</a>
    </div>
</body>
</html>
