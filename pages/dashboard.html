<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>اللوحة الرئيسية - نقابة المهن التمثيلية</title>
<link rel="stylesheet" href="../css/style.css" />
<style>
.dashboard { max-width: 900px; margin: 0 auto; padding: 20px; background:var(--bg); color:var(--text); font-family:system-ui,sans-serif; min-height:100vh; }
.dash-header { display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:12px; margin-bottom:24px; padding-bottom:16px; border-bottom:1px solid var(--border); }
.dash-header h1 { font-size:20px; color:var(--text); }
.dash-header .user-badge { font-size:13px; color:var(--text-secondary); }
.btn-logout { padding:8px 18px; background:transparent; border:1px solid var(--danger); color:var(--danger); border-radius:6px; cursor:pointer; font-size:13px; }
.btn-logout:hover { background:var(--danger); color:#fff; }
.card { background:var(--bg-card); border-radius:var(--radius-xl); padding:20px; margin-bottom:16px; box-shadow:var(--shadow-lg); }
.card h3 { font-size:15px; margin-bottom:12px; color:var(--text); }
.profile-row { display:flex; justify-content:space-between; padding:8px 0; border-bottom:1px solid var(--border); font-size:14px; flex-wrap:wrap; gap:4px; }
.profile-row:last-child { border-bottom:none; }
.profile-row .label { color:var(--text-secondary); }
.profile-row .value { font-weight:500; }
.status-badge { display:inline-block; padding:2px 10px; border-radius:20px; font-size:12px; font-weight:600; }
.status-approved { background:rgba(34,197,94,0.15); color:var(--success); }
.status-pending { background:rgba(245,200,66,0.15); color:var(--accent); }
.status-rejected { background:rgba(239,68,68,0.15); color:var(--danger); }
.member-card { padding:14px; border-bottom:1px solid var(--border); font-size:14px; }
.member-card:last-child { border-bottom:none; }
.member-card .member-name { font-weight:600; font-size:15px; }
.member-card .member-meta { display:flex; flex-wrap:wrap; gap:12px; margin-top:4px; color:var(--text-secondary); font-size:13px; }
.member-actions { display:flex; gap:6px; margin-top:8px; flex-wrap:wrap; }
.btn-sm { padding:5px 12px; border:none; border-radius:4px; cursor:pointer; font-size:12px; font-weight:600; }
.btn-sm:hover { opacity:0.8; }
.btn-approve { background:var(--success); color:#fff; }
.btn-reject { background:var(--danger); color:#fff; }
.tabs { display:flex; gap:4px; margin-bottom:16px; }
.tab { padding:8px 16px; border-radius:6px; cursor:pointer; font-size:13px; background:var(--bg-elevated); border:1px solid var(--border); color:var(--text-secondary); }
.tab.active { background:var(--accent); color:#0a0a14; border-color:var(--accent); font-weight:600; }
.empty-state { text-align:center; padding:30px 20px; color:var(--text-secondary); font-size:14px; }
#loading { text-align:center; padding:40px; color:var(--text-secondary); }
.admin-badge { background:var(--accent); color:#0a0a14; font-size:11px; padding:2px 8px; border-radius:4px; font-weight:700; margin-left:6px; }
</style>
</head>
<body>
<div class="dashboard" id="app" style="display:none;">
  <div class="dash-header">
    <h1>اللوحة الرئيسية</h1>
    <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;">
      <span class="user-badge" id="userEmail"></span>
      <button class="btn-logout" onclick="handleLogout()">تسجيل الخروج</button>
    </div>
  </div>
  <div id="loading">جاري التحميل...</div>
  <div id="content" style="display:none;">
    <div class="card" style="text-align:center;">
      <h3 style="justify-content:center;">الخدمات الرئيسية</h3>
      <a href="ashatari.html" style="display:inline-flex;align-items:center;gap:8px;padding:14px 32px;background:var(--accent-gradient);color:#0a0a14;border-radius:8px;text-decoration:none;font-weight:700;font-size:16px;margin:8px 0;">
        الاشطاري
      </a>
      <div style="margin-top:8px;font-size:13px;color:var(--text-secondary);">شاشة الأخبار والفعاليات والخدمات</div>
    </div>
    <div class="card">
      <h3>بياناتي</h3>
      <div id="profileInfo"></div>
    </div>
    <div class="card" id="adminPanel" style="display:none;">
      <h3>إدارة الأعضاء</h3>
      <div class="tabs">
        <span class="tab active" onclick="switchTab('all')">الكل</span>
        <span class="tab" onclick="switchTab('pending')">قيد الانتظار</span>
        <span class="tab" onclick="switchTab('approved')">المعتمدون</span>
      </div>
      <div id="membersList"></div>
    </div>
  </div>
</div>
<script>
const SU = 'https://bfdixkdwhccriliwtnch.supabase.co';
const AK = 'sb_publishable_Y3FsxqV_4RA96t7MassN4w_NcOJ31--';

function getToken() { try { return localStorage.getItem('sb-access-token'); } catch(e) { return null; } }
function getUser() { try { return JSON.parse(localStorage.getItem('sb-user')); } catch(e) { return null; } }
function clearSession() { try { localStorage.removeItem('sb-access-token'); localStorage.removeItem('sb-refresh-token'); localStorage.removeItem('sb-user'); } catch(e) {} }

function esc(s) { if (!s) return ''; var d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

function statusClass(st) { return st === 'approved' ? 'status-approved' : st === 'pending' ? 'status-pending' : 'status-rejected'; }
function statusText(st) { return st === 'approved' ? 'معتمد' : st === 'pending' ? 'قيد الانتظار' : 'مرفوض'; }

async function api(method, path, body) {
  var token = getToken();
  var headers = { 'apikey': AK };
  if (token) headers['Authorization'] = 'Bearer ' + token;
  if (body) headers['Content-Type'] = 'application/json';
  var opt = { method: method, headers: headers };
  if (body) opt.body = JSON.stringify(body);
  var r = await fetch(SU + path, opt);
  if (method === 'DELETE') return r.status;
  return await r.json();
}

var currentTab = 'all';

async function init() {
  var user = getUser();
  if (!user || !getToken()) { window.location.href = 'login.html'; return; }
  document.getElementById('userEmail').textContent = user.email;
  document.getElementById('app').style.display = 'block';
  await loadData(user);
}

async function loadData(user) {
  document.getElementById('loading').style.display = 'block';
  document.getElementById('content').style.display = 'none';
  try {
    var members = await api('GET', '/rest/v1/members?select=*&user_id=eq.' + user.id);
    var profile = Array.isArray(members) ? members[0] : null;
    document.getElementById('profileInfo').innerHTML = renderProfile(profile);
    var isAdmin = profile && profile.is_admin === true;
    if (isAdmin) {
      document.getElementById('adminPanel').style.display = 'block';
      var all = await api('GET', '/rest/v1/members?select=*&order=created_at.desc');
      if (Array.isArray(all)) { window.allMembers = all; renderMembers(currentTab); }
    }
  } catch(e) { document.getElementById('profileInfo').innerHTML = '<div class="empty-state">خطأ في التحميل</div>'; }
  document.getElementById('loading').style.display = 'none';
  document.getElementById('content').style.display = 'block';
}

function renderProfile(p) {
  if (!p) return '<div class="empty-state">لم يتم إنشاء ملفك بعد</div>';
  var ab = p.is_admin ? '<span class="admin-badge">آدمن</span>' : '';
  return '<div class="profile-row"><span class="label">الاسم</span><span class="value">' + esc(p.full_name) + ' ' + ab + '</span></div>' +
    '<div class="profile-row"><span class="label">البريد</span><span class="value">' + esc(p.email) + '</span></div>' +
    '<div class="profile-row"><span class="label">الهاتف</span><span class="value">' + (esc(p.phone) || '—') + '</span></div>' +
    '<div class="profile-row"><span class="label">التخصص</span><span class="value">' + (esc(p.professional_type) || '—') + '</span></div>' +
    '<div class="profile-row"><span class="label">الحالة</span><span class="value"><span class="status-badge ' + statusClass(p.membership_status) + '">' + statusText(p.membership_status) + '</span></span></div>' +
    (p.join_date ? '<div class="profile-row"><span class="label">تاريخ الانضمام</span><span class="value">' + p.join_date + '</span></div>' : '') +
    (p.bio ? '<div class="profile-row"><span class="label">نبذة</span><span class="value">' + esc(p.bio) + '</span></div>' : '');
}

function renderMembers(tab) {
  var list = window.allMembers || [];
  var filtered = tab === 'all' ? list : list.filter(function(m) { return m.membership_status === tab; });
  if (!filtered.length) { document.getElementById('membersList').innerHTML = '<div class="empty-state">لا يوجد أعضاء</div>'; return; }
  document.getElementById('membersList').innerHTML = filtered.map(function(m) {
    var actions = m.membership_status === 'pending' ? '<div class="member-actions"><button class="btn-sm btn-approve" onclick="approveMember(' + m.id + ')">اعتماد</button><button class="btn-sm btn-reject" onclick="rejectMember(' + m.id + ')">رفض</button></div>' : '';
    return '<div class="member-card"><div class="member-name">' + esc(m.full_name) + ' <span class="status-badge ' + statusClass(m.membership_status) + '">' + statusText(m.membership_status) + '</span></div>' +
      '<div class="member-meta"><span>' + esc(m.email) + '</span>' + (m.phone ? '<span>' + esc(m.phone) + '</span>' : '') + (m.professional_type ? '<span>' + esc(m.professional_type) + '</span>' : '') + '</div>' + actions + '</div>';
  }).join('');
}

function switchTab(t) { currentTab = t; document.querySelectorAll('.tab').forEach(function(el) { el.classList.toggle('active', el.textContent === t || (t === 'all' && el.textContent === 'الكل') || (t === 'pending' && el.textContent === 'قيد الانتظار') || (t === 'approved' && el.textContent === 'المعتمدون')); }); renderMembers(t); }
function approveMember(id) { updateMemberStatus(id, 'approved'); }
function rejectMember(id) { updateMemberStatus(id, 'rejected'); }
async function updateMemberStatus(id, st) { await api('PATCH', '/rest/v1/members?id=eq.' + id, { membership_status: st }); loadData(getUser()); }
function handleLogout() { clearSession(); window.location.href = '../index.html'; }
init();
</script>
</body>
</html>
