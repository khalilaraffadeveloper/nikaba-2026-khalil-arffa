<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>تفاصيل الفعالية - نقابة المهن التمثيلية</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link rel="stylesheet" href="../css/style.css" />
</head>
<body>
    <header class="site-header">
        <a href="events.html" class="sh-logo">
            <img src="../images/logoNikabo.png" alt="الشعار" />
            <h2>الفعاليات</h2>
        </a>
        <div class="sh-menu">
            <a href="login.html" class="sh-login"><i class="fas fa-sign-in-alt"></i></a>
        </div>
    </header>

    <main class="site-main" id="app">
        <div id="loading" style="text-align:center;padding:40px;color:var(--text-muted);">جاري التحميل...</div>
        <div id="content" style="display:none;">
            <div class="event-single-hero" id="heroImage"></div>
            <h1 id="eventTitle" style="font-size:19px;font-weight:800;margin-bottom:14px;"></h1>
            <div id="eventDetails"></div>
            <div class="event-desc" id="eventDesc"></div>
            <a href="events.html" style="display:block;text-align:center;padding:14px;font-size:13px;font-weight:600;color:var(--accent);"><i class="fas fa-arrow-left"></i> العودة للفعاليات</a>
        </div>
    </main>

    <script src="../js/supabase.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            var params = new URLSearchParams(window.location.search);
            var id = params.get('id');
            if (!id) { document.getElementById('app').innerHTML = '<div class="card" style="text-align:center;padding:40px;"><span style="color:var(--text-muted);">معرف الفعالية غير صحيح</span></div>'; return; }
            SB.api('GET', '/rest/v1/events?id=eq.' + id + '&select=*').then(function(d) {
                var item = Array.isArray(d) ? d[0] : d;
                if (!item || !item.id) { document.getElementById('app').innerHTML = '<div class="card" style="text-align:center;padding:40px;"><span style="color:var(--text-muted);">الفعالية غير موجودة</span></div>'; return; }
                document.getElementById('loading').style.display = 'none';
                document.getElementById('content').style.display = 'block';
                document.title = item.title + ' - نقابة المهن التمثيلية';
                if (item.image_path) document.getElementById('heroImage').innerHTML = '<img src="' + item.image_path + '" alt="' + item.title + '" /><div class="esh-overlay"><div class="esh-title">' + item.title + '</div></div>';
                document.getElementById('eventTitle').textContent = item.title;
                var details = '';
                if (item.event_date) details += '<div class="event-detail-row"><i class="fas fa-calendar-alt"></i> ' + item.event_date + '</div>';
                if (item.location) details += '<div class="event-detail-row"><i class="fas fa-map-marker-alt"></i> ' + item.location + '</div>';
                document.getElementById('eventDetails').innerHTML = details;
                document.getElementById('eventDesc').innerHTML = item.description || item.summary || '';
            }).catch(function() {
                document.getElementById('app').innerHTML = '<div class="card" style="text-align:center;padding:40px;"><span style="color:var(--text-muted);">خطأ في التحميل</span></div>';
            });
        });
    </script>
</body>
</html>
