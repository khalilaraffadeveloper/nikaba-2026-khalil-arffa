<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>المحادثة - نقابة المهن التمثيلية</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link rel="stylesheet" href="../css/style.css" />
    <style>
        .chat-page { display:flex; flex-direction:column; height:calc(100vh - 80px); margin:0; background:var(--bg-card); border-radius:var(--radius) var(--radius) 0 0; overflow:hidden; }
        .chat-top { display:flex; align-items:center; gap:8px; padding:12px 16px; border-bottom:1px solid var(--border); background:var(--bg-elevated); flex-shrink:0; }
        .chat-top .ct-title { font-size:16px; font-weight:600; flex:1; }
        .chat-top .ct-online { font-size:12px; color:var(--success); display:flex; align-items:center; gap:6px; }
        .chat-top .ct-toggle { width:36px; height:36px; border-radius:50%; border:1px solid var(--border); background:var(--bg-card); color:var(--text-secondary); cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:14px; flex-shrink:0; }
        .chat-top .ct-toggle:hover { border-color:var(--accent); color:var(--accent); }
        .chat-top .ct-toggle.active { background:var(--accent); color:#0a0a14; border-color:var(--accent); }
        .chat-channels { display:flex; gap:8px; overflow-x:auto; padding:12px 16px; border-bottom:1px solid var(--border); flex-shrink:0; }
        .chat-channels::-webkit-scrollbar { display:none; }
        .chat-channels .ch { flex-shrink:0; padding:8px 16px; border-radius:20px; font-size:13px; background:var(--bg-elevated); border:1px solid var(--border); color:var(--text-secondary); cursor:pointer; white-space:nowrap; display:flex; align-items:center; gap:6px; }
        .chat-channels .ch i { font-size:14px; }
        .chat-channels .ch.active { background:var(--accent); color:#0a0a14; border-color:var(--accent); }
        .chat-channels .ch:hover:not(.active) { border-color:var(--accent); color:var(--accent); }
        .chat-body { flex:1; overflow-y:auto; padding:16px; display:flex; flex-direction:column; gap:8px; }
        .chat-msg { display:flex; gap:8px; max-width:80%; }
        .chat-msg.own { flex-direction:row-reverse; align-self:flex-end; }
        .chat-msg .msg-avatar { width:32px; height:32px; border-radius:50%; flex-shrink:0; background:var(--bg-elevated); }
        .chat-msg .msg-bubble { background:var(--bg-elevated); border-radius:12px 12px 12px 4px; padding:10px 14px; }
        .chat-msg.own .msg-bubble { background:var(--accent); color:#0a0a14; border-radius:12px 12px 4px 12px; }
        .chat-msg .msg-name { font-size:12px; font-weight:600; color:var(--accent); margin-bottom:4px; }
        .chat-msg.own .msg-name { color:rgba(0,0,0,0.5); }
        .chat-msg .msg-text { font-size:14px; line-height:1.5; }
        .chat-msg .msg-time { font-size:11px; color:var(--text-muted); margin-top:4px; text-align:left; }
        .chat-msg.own .msg-time { color:rgba(0,0,0,0.4); }
        .chat-input-wrap { display:flex; align-items:center; gap:8px; padding:12px 16px; border-top:1px solid var(--border); background:var(--bg-elevated); flex-shrink:0; }
        .chat-input-wrap input { flex:1; background:var(--bg-card); border:1px solid var(--border); border-radius:24px; padding:10px 16px; font-size:14px; }
        .chat-input-wrap input:focus { outline:none; border-color:var(--accent); }
        .chat-input-wrap .chat-btn { width:40px; height:40px; border-radius:50%; border:none; cursor:pointer; font-size:16px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
        .chat-input-wrap .chat-send { background:var(--accent); color:#0a0a14; }
        .chat-input-wrap .chat-send:hover { transform:scale(1.05); }
        .chat-empty { text-align:center; padding:40px 20px; color:var(--text-muted); }
        .chat-empty i { font-size:48px; margin-bottom:16px; opacity:0.5; }
        @media (min-width:768px) { .chat-page { height:calc(100vh - 80px); border-radius:var(--radius); margin:0 auto; max-width:800px; } }
    </style>
</head>
<body>
    <header class="site-header">
        <a href="ashatari.html" class="sh-logo">
            <img src="../images/logoNikabo.png" alt="الشعار" />
            <h2>المحادثة</h2>
        </a>
        <div class="sh-menu">
            <a href="login.html" class="sh-login"><i class="fas fa-sign-in-alt"></i></a>
        </div>
    </header>

    <main class="site-main" style="padding:0;">
        <div class="chat-page">
            <div class="chat-top">
                <div class="ct-title"><i class="fas fa-comment-dots" style="color:var(--accent);"></i> غرفة النقاش</div>
                <div class="ct-online"><i class="fas fa-circle" style="font-size:6px;"></i> متصل</div>
            </div>

            <div class="chat-channels" id="chatChannels"></div>

            <div class="chat-body" id="chatBody">
                <div class="chat-empty" id="chatEmpty">
                    <i class="fas fa-comment-dots"></i>
                    <p>اختر قناة وابدأ المحادثة</p>
                </div>
            </div>

            <div class="chat-input-wrap" id="chatInputWrap" style="display:none;">
                <input type="text" id="chatInput" placeholder="اكتب رسالتك..." />
                <button class="chat-btn chat-send" id="chatSend"><i class="fas fa-paper-plane"></i></button>
            </div>
        </div>
    </main>

    <script src="../js/supabase.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            SB.requireAuth('login.html');

            var channelsEl = document.getElementById('chatChannels');
            var bodyEl = document.getElementById('chatBody');
            var emptyEl = document.getElementById('chatEmpty');
            var inputWrap = document.getElementById('chatInputWrap');
            var input = document.getElementById('chatInput');
            var sendBtn = document.getElementById('chatSend');
            var currentChannel = 'general';

            var channels = [
                { id: 'general', name: 'عام', icon: 'fa-comments' },
                { id: 'news', name: 'أخبار', icon: 'fa-newspaper' },
                { id: 'events', name: 'فعاليات', icon: 'fa-calendar-alt' },
                { id: 'support', name: 'دعم', icon: 'fa-life-ring' }
            ];

            channels.forEach(function(ch) {
                var a = document.createElement('a');
                a.className = 'ch' + (ch.id === currentChannel ? ' active' : '');
                a.innerHTML = '<i class="fas ' + ch.icon + '"></i> ' + ch.name;
                a.onclick = function() {
                    document.querySelectorAll('.ch').forEach(function(c) { c.classList.remove('active'); });
                    a.classList.add('active');
                    currentChannel = ch.id;
                    bodyEl.innerHTML = '<div class="chat-empty"><i class="fas fa-comment-dots"></i><p>غرفة ' + ch.name + '</p></div>';
                    inputWrap.style.display = 'flex';
                };
                channelsEl.appendChild(a);
            });

            function sendMessage() {
                var text = input.value.trim();
                if (!text) return;
                var msg = document.createElement('div');
                msg.className = 'chat-msg own';
                var now = new Date();
                msg.innerHTML = '<div class="msg-bubble"><div class="msg-text">' + text.replace(/</g,'&lt;') + '</div><div class="msg-time">' + now.getHours() + ':' + (now.getMinutes()<10?'0':'') + now.getMinutes() + '</div></div>';
                bodyEl.insertBefore(msg, inputWrap);
                input.value = '';
                bodyEl.scrollTop = bodyEl.scrollHeight;
            }

            sendBtn.addEventListener('click', sendMessage);
            input.addEventListener('keydown', function(e) { if (e.key === 'Enter') { e.preventDefault(); sendMessage(); } });
        });
    </script>
</body>
</html>
