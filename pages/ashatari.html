<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>الاشطاري - نقابة المهن التمثيلية</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link rel="stylesheet" href="../css/style.css" />
</head>
<body>

    <div class="ash-top">
        <img src="../images/logoNikabo.png" alt="الشعار" class="at-logo" />
        <div class="at-greeting">
            <div class="at-name" id="ashUserName">مرحباً، عضو النقابة</div>
            <div class="at-role" id="ashUserRole">عضو نشط</div>
        </div>
        <div class="at-actions">
            <a href="profile.html" title="الملف الشخصي"><i class="fas fa-user"></i></a>
            <a href="javascript:void(0)" id="notifBtn" title="الإشعارات">
                <i class="fas fa-bell"></i>
                <span class="at-badge" id="notifBadge" style="display:none;">0</span>
            </a>
            <a href="javascript:void(0)" title="تسجيل الخروج" onclick="if(confirm('تسجيل الخروج؟')){ SB.clearSession(); window.location.href='../index.html'; }"><i class="fas fa-sign-out-alt"></i></a>
        </div>
    </div>

    <div class="ash-feed">

        <div class="af-header">
            <h2><i class="fas fa-newspaper"></i> آخر الأخبار</h2>
            <a href="news.html">عرض الكل <i class="fas fa-arrow-left"></i></a>
        </div>

        <div id="ashNewsFeed">
        </div>

        <div class="af-header" style="margin-top:20px;">
            <h2><i class="fas fa-calendar-alt"></i> الفعاليات القادمة</h2>
            <a href="events.html">عرض الكل <i class="fas fa-arrow-left"></i></a>
        </div>

        <div id="ashEventsFeed">
        </div>

    </div>

    <div class="ash-fab">
        <button id="fabBtn" onclick="toggleDrawer()">
            <i class="fas fa-th-large"></i>
        </button>
    </div>

    <div class="ash-drawer-overlay" id="drawerOverlay" onclick="toggleDrawer()"></div>

    <div class="ash-drawer" id="ashDrawer">

        <div class="ad-header">
            <img src="../images/logoNikabo.png" alt="الصورة" id="drawerAvatar" />
            <div class="ad-info">
                <div class="ad-name" id="drawerUserName">عضو النقابة</div>
                <div class="ad-status">متصل</div>
            </div>
            <button class="ad-close" onclick="toggleDrawer()"><i class="fas fa-times"></i></button>
        </div>

        <div class="ad-section-title"><i class="fas fa-star"></i> الرئيسية</div>
        <div class="ad-grid">
            <a href="ashatari.html" class="ad-item">
                <div class="adi-icon gold"><i class="fas fa-home"></i></div>
                <span class="adi-label">الاشطاري</span>
            </a>
            <a href="news.html" class="ad-item">
                <div class="adi-icon gold"><i class="fas fa-newspaper"></i></div>
                <span class="adi-label">الأخبار</span>
            </a>
            <a href="events.html" class="ad-item">
                <div class="adi-icon gold"><i class="fas fa-calendar-alt"></i></div>
                <span class="adi-label">الفعاليات</span>
            </a>
            <a href="gallery.html" class="ad-item">
                <div class="adi-icon gold"><i class="fas fa-images"></i></div>
                <span class="adi-label">المعرض</span>
            </a>
            <a href="contact.html" class="ad-item">
                <div class="adi-icon gold"><i class="fas fa-headset"></i></div>
                <span class="adi-label">اتصل بنا</span>
            </a>
            <a href="about.html" class="ad-item">
                <div class="adi-icon gold"><i class="fas fa-info-circle"></i></div>
                <span class="adi-label">عن النقابة</span>
            </a>
        </div>

        <div class="ad-section-title"><i class="fas fa-cog"></i> الخدمات</div>
        <div class="ad-grid">
            <a href="chat.html" class="ad-item">
                <div class="adi-icon blue"><i class="fas fa-comments"></i></div>
                <span class="adi-label">الشات</span>
            </a>
            <a href="javascript:void(0)" class="ad-item" onclick="alert('قريباً');">
                <div class="adi-icon green"><i class="fas fa-envelope"></i></div>
                <span class="adi-label">المراسلات</span>
                <span class="adi-badge">3</span>
            </a>
            <a href="profile.html" class="ad-item">
                <div class="adi-icon purple"><i class="fas fa-user-circle"></i></div>
                <span class="adi-label">ملفي</span>
            </a>
            <a href="avatar_shop.html" class="ad-item">
                <div class="adi-icon pink"><i class="fas fa-store"></i></div>
                <span class="adi-label">المتجر</span>
            </a>
            <a href="javascript:void(0)" class="ad-item" onclick="alert('قريباً');">
                <div class="adi-icon orange"><i class="fas fa-wallet"></i></div>
                <span class="adi-label">الشحن</span>
            </a>
            <a href="javascript:void(0)" class="ad-item" onclick="alert('قريباً');">
                <div class="adi-icon teal"><i class="fas fa-vote-yea"></i></div>
                <span class="adi-label">الترشح</span>
            </a>
            <a href="javascript:void(0)" class="ad-item" onclick="alert('قريباً');">
                <div class="adi-icon red"><i class="fas fa-bell"></i></div>
                <span class="adi-label">الإشعارات</span>
                <span class="adi-badge">3</span>
            </a>
            <a href="javascript:void(0)" class="ad-item" onclick="alert('قريباً');">
                <div class="adi-icon purple"><i class="fas fa-chart-bar"></i></div>
                <span class="adi-label">الإحصائيات</span>
            </a>
            <a href="../control/dashboard.html" class="ad-item" id="adminDrawerLink" style="display:none;">
                <div class="adi-icon gold"><i class="fas fa-user-tie"></i></div>
                <span class="adi-label">المكتب التنفيذي</span>
            </a>
        </div>

        <div class="ad-footer">
            <a href="javascript:void(0)" onclick="if(confirm('تسجيل الخروج؟')){ SB.clearSession(); window.location.href='../index.html'; }"><i class="fas fa-sign-out-alt"></i> تسجيل الخروج</a>
        </div>
    </div>

    <script src="../js/supabase.js"></script>
    <script>
        var drawerOpen = false;

        function toggleDrawer() {
            drawerOpen = !drawerOpen;
            document.getElementById('ashDrawer').classList.toggle('open', drawerOpen);
            document.getElementById('drawerOverlay').classList.toggle('open', drawerOpen);
            document.getElementById('fabBtn').classList.toggle('open', drawerOpen);
        }

        document.addEventListener('DOMContentLoaded', function() {
            var user = SB.requireAuth('login.html');
            if (!user) return;

            document.getElementById('ashUserName').textContent = 'مرحباً، ' + (user.email || 'عضو النقابة');
            document.getElementById('drawerUserName').textContent = user.email || '';

            SB.api('GET', '/rest/v1/members?select=is_admin,full_name&user_id=eq.' + user.id).then(function(members) {
                var profile = Array.isArray(members) ? members[0] : null;
                if (profile) {
                    if (profile.full_name) {
                        document.getElementById('ashUserName').textContent = 'مرحباً، ' + profile.full_name;
                        document.getElementById('drawerUserName').textContent = profile.full_name;
                    }
                    if (profile.is_admin) {
                        document.getElementById('adminDrawerLink').style.display = '';
                        document.getElementById('ashUserRole').textContent = 'آدمن';
                    }
                }
            });

            SB.api('GET', '/rest/v1/news?select=*&is_published=eq.true&order=created_at.desc').then(function(news) {
                var feed = document.getElementById('ashNewsFeed');
                if (!news || !Array.isArray(news) || news.length === 0) {
                    feed.innerHTML = '<div class="card-sm" style="text-align:center;padding:24px;"><i class="fas fa-newspaper" style="font-size:28px;color:var(--text-muted);margin-bottom:8px;display:block;"></i><span style="font-size:13px;color:var(--text-muted);">لا توجد أخبار حالياً</span></div>';
                    return;
                }
                var html = '';
                for (var i = 0; i < Math.min(news.length, 5); i++) {
                    var item = news[i];
                    html += '<div class="ash-card">';
                    if (item.image_path) {
                        html += '<img class="ac-img" src="' + item.image_path + '" alt="' + item.title + '" />';
                    }
                    html += '<div class="ac-body">';
                    if (item.category) {
                        html += '<span class="ac-tag">' + item.category + '</span>';
                    }
                    html += '<div class="ac-title">' + item.title + '</div>';
                    if (item.summary) {
                        html += '<div class="ac-excerpt">' + item.summary + '</div>';
                    }
                    html += '<div class="ac-meta"><i class="fas fa-clock"></i> ' + (item.event_date || '') + '</div>';
                    html += '</div></div>';
                }
                feed.innerHTML = html;
            }).catch(function() {
                document.getElementById('ashNewsFeed').innerHTML = '<div class="card-sm" style="text-align:center;padding:24px;"><span style="font-size:13px;color:var(--text-muted);">لا توجد أخبار حالياً</span></div>';
            });

            SB.api('GET', '/rest/v1/events?select=*&is_published=eq.true&order=created_at.desc').then(function(events) {
                var feed = document.getElementById('ashEventsFeed');
                if (!events || !Array.isArray(events) || events.length === 0) {
                    feed.innerHTML = '<div class="card-sm" style="text-align:center;padding:24px;"><i class="fas fa-calendar-alt" style="font-size:28px;color:var(--text-muted);margin-bottom:8px;display:block;"></i><span style="font-size:13px;color:var(--text-muted);">لا توجد فعاليات قادمة</span></div>';
                    return;
                }
                var html = '';
                for (var i = 0; i < Math.min(events.length, 5); i++) {
                    var item = events[i];
                    html += '<div class="ash-card">';
                    if (item.image_path) {
                        html += '<img class="ac-img" src="' + item.image_path + '" alt="' + item.title + '" />';
                    }
                    html += '<div class="ac-body">';
                    html += '<div class="ac-title">' + item.title + '</div>';
                    if (item.summary) {
                        html += '<div class="ac-excerpt">' + item.summary + '</div>';
                    }
                    html += '<div class="ac-meta"><i class="fas fa-map-marker-alt"></i> ' + (item.location || '') + ' &middot; <i class="fas fa-clock"></i> ' + (item.event_date || '') + '</div>';
                    html += '</div></div>';
                }
                feed.innerHTML = html;
            }).catch(function() {
                document.getElementById('ashEventsFeed').innerHTML = '<div class="card-sm" style="text-align:center;padding:24px;"><span style="font-size:13px;color:var(--text-muted);">لا توجد فعاليات قادمة</span></div>';
            });
        });
    </script>

</body>
</html>
