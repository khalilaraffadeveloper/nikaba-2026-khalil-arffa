<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>طلب عضوية - نقابة المهن التمثيلية</title>
<link rel="stylesheet" href="../css/style.css" />
<style>
.auth-body { display:flex; align-items:center; justify-content:center; min-height:100vh; padding:20px; background:var(--bg); color:var(--text); font-family:system-ui,sans-serif; }
.auth-card { background:var(--bg-card); border-radius:var(--radius-xl); padding:32px 24px; width:100%; max-width:460px; box-shadow:var(--shadow-lg); }
.auth-card h2 { text-align:center; margin-bottom:8px; font-size:22px; }
.auth-card .sub { text-align:center; color:var(--text-secondary); font-size:14px; margin-bottom:28px; }
.form-group { margin-bottom:16px; }
.form-group label { display:block; font-size:13px; color:var(--text-secondary); margin-bottom:6px; }
.form-group input, .form-group select { width:100%; padding:14px 16px; background:var(--bg-elevated); border:1px solid var(--border); border-radius:var(--radius-sm); color:var(--text); font-size:15px; outline:none; }
.form-group input:focus, .form-group select:focus { border-color:var(--accent); }
.btn-submit { width:100%; padding:14px; background:var(--accent-gradient); border:none; border-radius:var(--radius-sm); color:#0a0a14; font-size:16px; font-weight:700; cursor:pointer; }
.btn-submit:hover { opacity:0.9; }
.btn-submit:disabled { opacity:0.5; cursor:not-allowed; }
.auth-footer { text-align:center; margin-top:20px; font-size:14px; color:var(--text-secondary); }
.auth-footer a { color:var(--accent); font-weight:500; }
.msg { text-align:center; font-size:13px; margin-top:12px; min-height:20px; }
.msg.error { color:var(--danger); }
.msg.success { color:var(--success); }
.back-link { display:inline-flex; align-items:center; gap:6px; color:var(--text-secondary); font-size:13px; margin-bottom:20px; }
</style>
</head>
<body class="auth-body">
  <div class="auth-card">
    <a href="../index.html" class="back-link"> العودة للرئيسية</a>
    <h2>طلب عضوية</h2>
    <p class="sub">انضم إلى نقابة المهن التمثيلية وكن جزءاً من الأسرة الفنية</p>
    <form id="registerForm">
      <div class="form-group">
        <label>الاسم الكامل</label>
        <input type="text" id="fullName" placeholder="الاسم كما في الهوية" required />
      </div>
      <div class="form-group">
        <label>البريد الإلكتروني</label>
        <input type="email" id="email" placeholder="your@email.com" required />
      </div>
      <div class="form-group">
        <label>رقم الهاتف</label>
        <input type="tel" id="phone" placeholder="+222 12 34 56 78" dir="ltr" />
      </div>
      <div class="form-group">
        <label>التخصص الفني</label>
        <select id="profession">
          <option value="">اختر تخصصك</option>
          <option value="ممثل">ممثل</option>
          <option value="مخرج">مخرج</option>
          <option value="منتج">منتج</option>
          <option value="كاتب سيناريو">كاتب سيناريو</option>
          <option value="فني مسرح">فني مسرح</option>
          <option value="أخرى">أخرى</option>
        </select>
      </div>
      <div class="form-group">
        <label>كلمة المرور</label>
        <input type="password" id="password" placeholder="حدد كلمة مرور قوية" required />
      </div>
      <button type="submit" class="btn-submit" id="submitBtn">إرسال الطلب</button>
    </form>
    <div id="msg" class="msg"></div>
    <div class="auth-footer">
      لديك حساب بالفعل؟ <a href="login.html">تسجيل الدخول</a>
    </div>
  </div>
<script>
var SU = 'https://bfdixkdwhccriliwtnch.supabase.co';
var AK = 'sb_publishable_Y3FsxqV_4RA96t7MassN4w_NcOJ31--';
document.getElementById('registerForm').addEventListener('submit', function(e) {
  e.preventDefault();
  var msg = document.getElementById('msg');
  var btn = document.getElementById('submitBtn');
  msg.className = 'msg';
  msg.textContent = 'جاري إنشاء الحساب...';
  btn.disabled = true;
  var email = document.getElementById('email').value;
  var password = document.getElementById('password').value;
  var fullName = document.getElementById('fullName').value;
  var phone = document.getElementById('phone').value;
  var profession = document.getElementById('profession').value;
  var userData = { full_name: fullName };
  if (phone) userData.phone = phone;
  if (profession) userData.profession = profession;
  fetch(SU + '/auth/v1/signup', {
    method: 'POST',
    headers: { 'apikey': AK, 'Content-Type': 'application/json' },
    body: JSON.stringify({ email: email, password: password, data: userData })
  }).then(function(r) { return r.json(); }).then(function(result) {
    if (result.error) {
      msg.className = 'msg error';
      msg.textContent = result.error_description || result.error.message || result.msg || 'حدث خطأ';
      btn.disabled = false;
    } else if (result.id || result.user) {
      msg.className = 'msg success';
      msg.textContent = 'تم إرسال الطلب بنجاح! تحقق من بريدك الإلكتروني للتأكيد.';
      setTimeout(function() { window.location.href = 'login.html'; }, 2500);
    } else {
      msg.className = 'msg success';
      msg.textContent = 'تم إرسال الطلب بنجاح! تحقق من بريدك الإلكتروني للتأكيد.';
      setTimeout(function() { window.location.href = 'login.html'; }, 2500);
    }
  }).catch(function(err) {
    msg.className = 'msg error';
    msg.textContent = 'خطأ في الاتصال: ' + err.message;
    btn.disabled = false;
  });
});
</script>
</body>
</html>
