<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>الأخبار - نقابة المهن التمثيلية</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link rel="stylesheet" href="../css/style.css" />
</head>
<body>
    <header class="site-header">
        <a href="index.html" class="sh-logo">
            <img src="../images/logoNikabo.png" alt="الشعار" />
            <h2>الأخبار</h2>
        </a>
        <div class="sh-menu">
            <a href="login.html" class="sh-login"><i class="fas fa-sign-in-alt"></i> دخول</a>
            <a href="register.html" class="sh-register"><i class="fas fa-user-plus"></i></a>
        </div>
    </header>

    <main class="site-main">
        <div class="section-title fade-up"><i class="fas fa-newspaper"></i> جميع الأخبار</div>
        <div class="news-filter" id="newsFilter">
            <a href="javascript:void(0)" class="active" onclick="filterNews('all',this)">الكل</a>
        </div>
        <div id="newsList"></div>
    </main>

    <nav class="site-bottom-nav">
        <a href="index.html"><i class="fas fa-home"></i><span>الرئيسية</span></a>
        <a href="news.html" class="active"><i class="fas fa-newspaper"></i><span>الأخبار</span></a>
        <a href="events.html"><i class="fas fa-calendar-alt"></i><span>الفعاليات</span></a>
        <a href="gallery.html"><i class="fas fa-images"></i><span>المعرض</span></a>
        <a href="contact.html"><i class="fas fa-headset"></i><span>اتصل بنا</span></a>
    </nav>

    <script src="../js/supabase.js"></script>
    <script>
        var allNews = [];

        function loadNews() {
            SB.api('GET', '/rest/v1/news?select=*&is_published=eq.true&order=created_at.desc').then(function(d) {
                if (!Array.isArray(d)) { document.getElementById('newsList').innerHTML = '<div class="card" style="text-align:center;padding:24px;"><span style="color:var(--text-muted);">لا توجد أخبار</span></div>'; return; }
                allNews = d;
                var cats = {};
                for (var i = 0; i < d.length; i++) { if (d[i].category) cats[d[i].category] = true; }
                var filterEl = document.getElementById('newsFilter');
                for (var c in cats) {
                    var a = document.createElement('a');
                    a.href = 'javascript:void(0)';
                    a.textContent = c;
                    a.onclick = function() { filterNews(this.textContent, this); };
                    filterEl.appendChild(a);
                }
                renderNews(d);
            }).catch(function() {
                document.getElementById('newsList').innerHTML = '<div class="card" style="text-align:center;padding:24px;"><span style="color:var(--text-muted);">لا توجد أخبار</span></div>';
            });
        }

        function filterNews(cat, el) {
            var filters = document.querySelectorAll('.news-filter a');
            for (var i = 0; i < filters.length; i++) filters[i].classList.remove('active');
            if (el) el.classList.add('active');
            if (cat === 'all') renderNews(allNews);
            else renderNews(allNews.filter(function(n) { return n.category === cat; }));
        }

        function renderNews(list) {
            var el = document.getElementById('newsList');
            if (!list || list.length === 0) { el.innerHTML = '<div class="card" style="text-align:center;padding:24px;"><span style="color:var(--text-muted);">لا توجد أخبار</span></div>'; return; }
            var h = '';
            for (var i = 0; i < list.length; i++) {
                var item = list[i];
                h += '<div class="news-item"><a href="news_detail.html?id=' + item.id + '" style="display:flex;gap:14px;text-decoration:none;color:inherit;width:100%;">';
                if (item.image_path) h += '<img class="ni-thumb" src="' + item.image_path + '" alt="" />';
                h += '<div class="ni-info"><div class="ni-title">' + SB.esc(item.title) + '</div>';
                h += '<div class="ni-meta">' + (item.category ? '<span class="ni-tag">' + item.category + '</span>' : '') + '<span>' + (item.event_date || '') + '</span></div>';
                h += '</div></a></div>';
            }
            el.innerHTML = h;
        }

        document.addEventListener('DOMContentLoaded', loadNews);
    </script>
</body>
</html>
