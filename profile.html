<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>الملف الشخصي - نقابة المهن التمثيلية</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link rel="stylesheet" href="css/style.css" />
    <script src="js/supabase-auth.js"></script>
    <style>
        .pr-page { min-height: 100vh; background: var(--bg); padding: 0 0 80px; }
        .pr-header {
            background: var(--bg-card);
            border-bottom: 1px solid var(--border-light);
            padding: 14px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .pr-header a {
            color: var(--text-secondary);
            font-size: 18px;
            text-decoration: none;
            padding: 4px 8px;
        }
        .pr-header a:hover { color: var(--accent); }
        .pr-header h1 { font-size: 16px; font-weight: 800; color: var(--text); flex: 1; }
        .pr-cover {
            height: 120px;
            background: linear-gradient(135deg, var(--bg-elevated), var(--bg-card));
            border-bottom: 1px solid var(--border-light);
            position: relative;
        }
        .pr-avatar-wrap {
            position: absolute;
            bottom: -40px;
            left: 50%;
            transform: translateX(-50%);
            width: 80px; height: 80px;
            border-radius: 50%;
            border: 4px solid var(--bg);
            background: var(--bg-elevated);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            font-weight: 900;
            color: var(--accent);
        }
        .pr-info {
            text-align: center;
            padding: 48px 16px 20px;
        }
        .pr-info h2 { font-size: 20px; font-weight: 800; color: var(--text); }
        .pr-info .pr-email { font-size: 13px; color: var(--text-muted); }
        .pr-info .pr-role {
            display: inline-block;
            font-size: 11px;
            padding: 3px 14px;
            border-radius: 999px;
            margin-top: 6px;
        }
        .pr-role-member { background: var(--accent-glow); color: var(--accent); }
        .pr-role-admin { background: rgba(59,130,246,0.15); color: var(--primary); }
        .pr-role-executive { background: rgba(139,92,246,0.15); color: var(--purple); }
        .pr-section {
            padding: 16px;
            border-bottom: 1px solid var(--border-light);
        }
        .pr-section h3 {
            font-size: 13px;
            font-weight: 700;
            color: var(--accent);
            margin-bottom: 12px;
        }
        .pr-field {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid var(--border-light);
        }
        .pr-field:last-child { border-bottom: none; }
        .pr-field-label { font-size: 12px; color: var(--text-muted); }
        .pr-field-value { font-size: 14px; color: var(--text); font-weight: 600; direction: ltr; text-align: right; }
        .pr-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            border: none;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
            margin-bottom: 10px;
        }
        .pr-btn-primary { background: var(--accent); color: #0a0a14; }
        .pr-btn-primary:hover { background: var(--accent-hover); }
        .pr-btn-danger { background: none; color: var(--danger); border: 1px solid rgba(239,68,68,0.2); }
        .pr-btn-danger:hover { background: rgba(239,68,68,0.1); }
        .pr-btn-secret {
            display: none;
            background: linear-gradient(135deg, var(--accent), #d4a830);
            color: #0a0a14;
        }
        .pr-btn-secret.show { display: flex; }
        .pr-actions { padding: 16px; }
        .pr-back-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: var(--text-muted);
            font-size: 13px;
            text-decoration: none;
        }
        .pr-back-link:hover { color: var(--accent); }
    </style>
</head>
<body>
    <div class="pr-page">
        <div class="pr-header">
            <a href="general-assembly.html"><i class="fas fa-arrow-right"></i></a>
            <h1>الملف الشخصي</h1>
        </div>
        <div class="pr-cover">
            <div class="pr-avatar-wrap" id="prAvatar">ع</div>
        </div>
        <div class="pr-info">
            <h2 id="prName">عضو</h2>
            <div class="pr-email" id="prEmail">member@nikaba.mr</div>
            <span class="pr-role pr-role-member" id="prRole">✔️ عضو</span>
        </div>
        <div class="pr-section">
            <h3><i class="fas fa-id-card"></i> المعلومات الأساسية</h3>
            <div class="pr-field"><span class="pr-field-label">الاسم</span><span class="pr-field-value" id="prFieldName">عضو</span></div>
            <div class="pr-field"><span class="pr-field-label">البريد الإلكتروني</span><span class="pr-field-value" id="prFieldEmail">—</span></div>
            <div class="pr-field"><span class="pr-field-label">رقم الهاتف</span><span class="pr-field-value" id="prFieldPhone">—</span></div>
            <div class="pr-field"><span class="pr-field-label">بطاقة التعريف</span><span class="pr-field-value" id="prFieldId">—</span></div>
            <div class="pr-field"><span class="pr-field-label">الواتساب</span><span class="pr-field-value" id="prFieldWhatsapp">—</span></div>
            <div class="pr-field"><span class="pr-field-label">تاريخ التسجيل</span><span class="pr-field-value" id="prFieldCreated">—</span></div>
        </div>
        <div class="pr-actions">
            <a href="control/EL_Mekteb1.html" class="pr-btn pr-btn-secret" id="prSecretBtn"><i class="fas fa-tachometer-alt"></i> 🛠️ لوحة المكتب التنفيذي</a>
            <button class="pr-btn pr-btn-primary" id="prEditBtn"><i class="fas fa-edit"></i> تعديل البيانات</button>
            <button class="pr-btn pr-btn-danger" id="prLogoutBtn"><i class="fas fa-sign-out-alt"></i> تسجيل خروج</button>
        </div>
    </div>
    <script>
    (function() {
        if (!SupabaseAuth.checkAuth(true)) return;
        var user = SupabaseAuth.getUser();
        var userEmail = user ? user.email : '';
        var userId = user ? user.id : '';
        var userName = userEmail ? userEmail.split('@')[0] : 'عضو';
        document.getElementById('prName').textContent = userName;
        document.getElementById('prEmail').textContent = userEmail;
        document.getElementById('prAvatar').textContent = userName.charAt(0).toUpperCase();
        document.getElementById('prFieldName').textContent = userName;
        document.getElementById('prFieldEmail').textContent = userEmail;

        (async function() {
            try {
                var token = SupabaseAuth.getToken();
                var res = await fetch('https://bfdixkdwhccriliwtnch.supabase.co/rest/v1/profiles?user_id=eq.' + userId + '&select=*', {
                    headers: { 'apikey': 'sb_publishable_Y3FsxqV_4RA96t7MassN4w_NcOJ31--', 'Authorization': 'Bearer ' + token }
                });
                if (!res.ok) { console.warn('Profile fetch failed', res.status); return; }
                var profiles = await res.json();
                if (profiles && profiles.length > 0) {
                    var p = profiles[0];
                    if (p.phone) document.getElementById('prFieldPhone').textContent = p.phone;
                    if (p.national_id) document.getElementById('prFieldId').textContent = p.national_id;
                    if (p.whatsapp) document.getElementById('prFieldWhatsapp').textContent = p.whatsapp;
                    if (p.name) { document.getElementById('prName').textContent = p.name; document.getElementById('prFieldName').textContent = p.name; }
                    if (p.created_at) document.getElementById('prFieldCreated').textContent = new Date(p.created_at).toLocaleDateString('ar-MR');
                    if (p.role) {
                        var roleEl = document.getElementById('prRole');
                        if (p.role === 'admin') { roleEl.textContent = '🛡️ آدمن'; roleEl.className = 'pr-role pr-role-admin'; }
                        else if (p.role === 'executive') { roleEl.textContent = '⚡ مكتب تنفيذي'; roleEl.className = 'pr-role pr-role-executive'; }
                        else { roleEl.textContent = '✔️ عضو'; roleEl.className = 'pr-role pr-role-member'; }
                        if (p.role === 'admin' || p.role === 'executive') document.getElementById('prSecretBtn').classList.add('show');
                    }
                }
            } catch(e) { console.warn('Profile load error', e); }
        })();

        document.getElementById('prEditBtn').addEventListener('click', function() {
            alert('✏️ قريباً — سيتم تفعيل خاصية تعديل البيانات.');
        });
        document.getElementById('prLogoutBtn').addEventListener('click', function() {
            if (confirm('تأكيد تسجيل الخروج؟')) SupabaseAuth.signOut();
        });
    })();
    </script>
</body>
</html>
