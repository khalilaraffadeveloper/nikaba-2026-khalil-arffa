<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>دليل الأعضاء - نقابة المهن التمثيلية</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link rel="stylesheet" href="css/style.css" />
    <script src="js/supabase-auth.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Tajawal', sans-serif; background: #0a0a14; color: #e2e8f0; }
        .members-page { max-width: 1100px; margin: 0 auto; padding: 24px 16px; }
        .members-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 10px; }
        .members-header h1 { font-size: 22px; color: var(--accent, #f5c842); }
        .members-toolbar { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 20px; }
        .members-toolbar input { flex: 1; min-width: 180px; padding: 10px 14px; border-radius: 10px; border: 1px solid #1e293b; background: #111827; color: #e2e8f0; font-size: 13px; }
        .members-count { font-size: 13px; color: #64748b; }
        .members-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; }
        .member-card { background: #111827; border: 1px solid #1e293b; border-radius: 14px; padding: 16px; text-align: center; }
        .member-avatar { width: 56px; height: 56px; border-radius: 50%; background: linear-gradient(135deg, #f5c842, #d97706); margin: 0 auto 10px; display: flex; align-items: center; justify-content: center; font-size: 22px; font-weight: 700; color: #0a0a14; }
        .member-name { font-size: 14px; font-weight: 700; margin-bottom: 2px; }
        .member-role { font-size: 11px; padding: 2px 8px; border-radius: 20px; display: inline-block; margin-top: 4px; }
        .member-role.admin { background: rgba(245,200,66,0.15); color: #f5c842; }
        .member-role.executive { background: rgba(99,102,241,0.15); color: #818cf8; }
        .member-role.member { background: rgba(34,197,94,0.15); color: #22c55e; }
        .member-joined { font-size: 11px; color: #64748b; margin-top: 6px; }
        .members-empty { text-align: center; padding: 60px 20px; color: #64748b; }
        .back-link { display: inline-block; margin-top: 20px; color: #64748b; font-size: 13px; text-decoration: none; }
        .back-link:hover { color: #f5c842; }
    </style>
</head>
<body>
    <div class="members-page">
        <div class="members-header">
            <h1><i class="fas fa-users"></i> دليل الأعضاء</h1>
            <div class="members-count" id="membersCount">جاري التحميل...</div>
        </div>
        <div class="members-toolbar">
            <input type="text" id="membersSearch" placeholder="بحث باسم عضو..." />
        </div>
        <div class="members-grid" id="membersGrid">
            <div class="members-empty"><i class="fas fa-spinner fa-spin" style="font-size:32px;"></i><p style="margin-top:8px;">جاري تحميل الأعضاء...</p></div>
        </div>
        <a href="general-assembly.html" class="back-link"><i class="fas fa-arrow-right"></i> العودة إلى الجمعية العامة</a>
    </div>
    <script>
    (function() {
        var allMembers = [];
        var api = 'https://bfdixkdwhccriliwtnch.supabase.co';
        var key = 'sb_publishable_Y3FsxqV_4RA96t7MassN4w_NcOJ31--';
        function h() { return { 'apikey': key, 'Authorization': 'Bearer ' + (SupabaseAuth.getToken() || key) }; }
        async function load() {
            try { var r = await fetch(api + '/rest/v1/profiles?select=name,email,role,avatar_url,created_at&order=created_at.desc', { headers: h() }); allMembers = r.ok ? (await r.json() || []) : []; } catch(e) { allMembers = []; }
            render();
        }
        function render() {
            var q = document.getElementById('membersSearch').value.trim().toLowerCase();
            var filtered = allMembers.filter(function(m) { return !q || (m.name||'').toLowerCase().indexOf(q) !== -1; });
            document.getElementById('membersCount').textContent = filtered.length + ' عضو';
            var grid = document.getElementById('membersGrid');
            if (!filtered.length) { grid.innerHTML = '<div class="members-empty"><i class="fas fa-users" style="font-size:32px;opacity:0.4;"></i><p style="margin-top:8px;">لا يوجد أعضاء</p></div>'; return; }
            var html = '';
            filtered.forEach(function(m) {
                var initial = (m.name || m.email || '?').charAt(0).toUpperCase();
                var roleClass = m.role === 'admin' ? 'admin' : m.role === 'executive' ? 'executive' : 'member';
                var roleLabel = m.role === 'admin' ? 'آدمن' : m.role === 'executive' ? 'مكتب تنفيذي' : 'عضو';
                var date = m.created_at ? m.created_at.slice(0,10) : '';
                html += '<div class="member-card"><div class="member-avatar">' + initial + '</div><div class="member-name">' + (m.name || m.email || 'غير معروف') + '</div><span class="member-role ' + roleClass + '">' + roleLabel + '</span><div class="member-joined">' + (date ? 'انتسب ' + date : '') + '</div></div>';
            });
            grid.innerHTML = html;
        }
        document.getElementById('membersSearch').addEventListener('input', render);
        load();
    })();
    </script>
</body>
</html>
